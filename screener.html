<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Screener - Algoritmico</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent-blue: #58a6ff;
            --border-color: #30363d;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        nav {
            background-color: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .nav-links {
            display: flex;
            gap: 15px;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            padding: 6px 12px;
            border-radius: 4px;
        }

        .nav-links a.active, .nav-links a:hover {
            color: var(--text-main);
            background-color: rgba(88, 166, 255, 0.15);
        }

        .strategy-info {
            font-size: 0.85rem;
            color: var(--accent-blue);
            background-color: rgba(88, 166, 255, 0.1);
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid rgba(88, 166, 255, 0.2);
        }

        .screener-container {
            flex-grow: 1;
            width: 100%;
            height: calc(100vh - 55px);
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-links">
            <a href="index.html">📈 Multi-Chart Workspace</a>
            <a href="screener.html" class="active">🔍 Stock Screener</a>
        </div>
        <div class="strategy-info">Filtri Video: P/E &lt; 20 | Volume Spike &gt; 2x | RSI &gt; 50</div>
    </nav>

    <div class="screener-container">
        <div class="tradingview-widget-container" style="width: 100%; height: 100%;">
            <div id="tradingview_screener" style="width: 100%; height: 100%;"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js" async>
            {
                "width": "100%",
                "height": "100%",
                "defaultColumn": "overview",
                "defaultScreen": "general",
                "market": "america",
                "showToolbar": true,
                "colorTheme": "dark",
                "locale": "it",
                "columns": [
                    "name",
                    "close",
                    "price_earnings_ttm",
                    "volume",
                    "relative_volume_10d_calc",
                    "RSI14"
                ],
                "sortField": "relative_volume_10d_calc",
                "sortOrder": "desc"
            }
            </script>
        </div>
    </div>

</body>
</html>
