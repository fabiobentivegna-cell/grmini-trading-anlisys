<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Multi-Chart Dashboard (No Limits)</title>
    <style>
        :root {
            --bg-main: #0c0f12;
            --bg-navbar: #131722;
            --bg-card: #1c2030;
            --text-color: #d1d4dc;
            --text-muted: #848e9c;
            --accent-color: #2962ff;
            --border-color: #2a2e39;
            --input-bg: #2a2e39;
            --input-text: #fff;
        }

        [data-theme="light"] {
            --bg-main: #f0f2f5;
            --bg-navbar: #ffffff;
            --bg-card: #ffffff;
            --text-color: #1e222d;
            --text-muted: #707a8a;
            --accent-color: #2962ff;
            --border-color: #e0e3eb;
            --input-bg: #f0f2f5;
            --input-text: #1e222d;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        .navbar {
            background-color: var(--bg-navbar);
            border-bottom: 1px solid var(--border-color);
            padding: 10px 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            z-index: 10;
            box-sizing: border-box;
        }

        .brand {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-color);
        }

        .controls-group {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        select, input, button {
            background-color: var(--input-bg);
            color: var(--input-text);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s;
        }

        select:focus, input:focus {
            border-color: var(--accent-color);
        }

        button {
            cursor: pointer;
            font-weight: 500;
        }

        button:hover {
            opacity: 0.9;
        }

        .btn-accent {
            background-color: var(--accent-color);
            color: #fff;
            border: none;
        }

        .theme-toggle-btn {
            font-size: 1.1rem;
            padding: 4px 10px;
        }

        .main-content {
            flex-grow: 1;
            padding: 10px;
            overflow: hidden;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .charts-grid {
            display: grid;
            gap: 10px;
            width: 100%;
            height: 100%;
            flex-grow: 1;
        }

        .grid-1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
        .grid-2 { grid-template-columns: repeat(2, 1fr); grid-template-rows: 1fr; }
        .grid-3 { grid-template-columns: repeat(3, 1fr); grid-template-rows: 1fr; }
        .grid-4 { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); }
        .grid-5 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }
        .grid-6 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }

        .chart-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 5px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            height: 100%;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
            padding: 2px 5px;
        }

        .chart-title {
            font-size: 0.85rem;
            font-weight: 600;
        }

        .iframe-container {
            flex-grow: 1;
            width: 100%;
            height: calc(100% - 28px);
            border: none;
            border-radius: 4px;
            background-color: #131722;
        }

        .template-section {
            border-left: 1px solid var(--border-color);
            padding-left: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="brand">📊 Multi-Market Dash Pro</div>
        
        <div class="controls-group">
            <div>
                <label for="market-select">Mercato:</label>
                <select id="market-select" onchange="loadPredefinedMarket(this.value)">
                    <option value="indices">📉 Indici Mondiali</option>
                    <option value="crypto">🪙 Crypto</option>
                    <option value="usa">🇺🇸 Azionario USA</option>
                    <option value="italia">🇮🇹 Azionario Italia</option>
                    <option value="forex">💱 Forex</option>
                    <option value="commodities">🛢️ Commodities</option>
                </select>
            </div>

            <div>
                <label for="chart-count">Grafici:</label>
                <select id="chart-count" onchange="updateChartCount(parseInt(this.value))">
                    <option value="1">1 Grafico</option>
                    <option value="2">2 Grafici</option>
                    <option value="3" selected>3 Grafici</option>
                    <option value="4">4 Grafici</option>
                    <option value="5">5 Grafici</option>
                    <option value="6">6 Grafici</option>
                </select>
            </div>

            <button class="theme-toggle-btn" onclick="toggleTheme()" title="Cambia Tema">🌓</button>
        </div>

        <div class="controls-group template-section">
            <div>
                <input type="text" id="template-name" placeholder="Nome template...">
                <button class="btn-accent" onclick="saveCurrentTemplate()">Salva Custom</button>
            </div>
            <div>
                <select id="template-select" onchange="loadSavedTemplate(this.value)">
                    <option value="" disabled selected>I tuoi Template...</option>
                </select>
                <button onclick="deleteSelectedTemplate()" style="color: #ff4d4f;">Elimina</button>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="charts-grid grid-3" id="charts-container">
            </div>
    </div>

    <script type="text/javascript">
        // Nuovi ID stabili mappati sul server grafico sbloccato (Coppie principali)
        const marketProducts = {
            "indices": [
                { name: "S&P 500", pairId: "166" },
                { name: "Nasdaq 100", pairId: "14958" },
                { name: "DAX 40", pairId: "172" },
                { name: "FTSE MIB", pairId: "177" },
                { name: "Dow Jones 30", pairId: "169" },
                { name: "Nikkei 225", pairId: "178" }
            ],
            "crypto": [
                { name: "Bitcoin / USD", pairId: "1057391" },
                { name: "Ethereum / USD", pairId: "1058142" },
                { name: "Solana / USD", pairId: "1173834" },
                { name: "Ripple / USD", pairId: "1057392" },
                { name: "Cardano / USD", pairId: "1061386" },
                { name: "BNB / USD", pairId: "1129141" }
            ],
            "usa": [
                { name: "Apple", pairId: "6408" },
                { name: "Tesla", pairId: "13994" },
                { name: "NVIDIA", pairId: "6497" },
                { name: "Microsoft", pairId: "6435" },
                { name: "Amazon", pairId: "6434" },
                { name: "Meta", pairId: "26490" }
            ],
            "italia": [
                { name: "Eni", pairId: "10048" },
                { name: "UniCredit", pairId: "10064" },
                { name: "Intesa Sanpaolo", pairId: "10055" },
                { name: "Enel", pairId: "10047" },
                { name: "Ferrari", pairId: "951252" },
                { name: "Stellantis MIL", pairId: "10034" }
            ],
            "forex": [
                { name: "EUR / USD", pairId: "1" },
                { name: "GBP / USD", pairId: "2" },
                { name: "USD / JPY", pairId: "3" },
                { name: "AUD / USD", pairId: "5" },
                { name: "EUR / GBP", pairId: "6" },
                { name: "USD / CAD", pairId: "7" }
            ],
            "commodities": [
                { name: "Oro (Gold)", pairId: "8830" },
                { name: "Petrolio (Crude Oil)", pairId: "8849" },
                { name: "Gas Naturale", pairId: "8862" },
                { name: "Argento", pairId: "8836" },
                { name: "Rame", pairId: "8831" },
                { name: "Platino", pairId: "8911" }
            ]
        };

        let currentTheme = "dark";
        let currentChartCount = 3;
        let activeProducts = [...marketProducts["indices"]]; 

        document.addEventListener("DOMContentLoaded", function() {
            if (localStorage.getItem("dashboard-theme")) {
                currentTheme = localStorage.getItem("dashboard-theme");
                document.documentElement.setAttribute("data-theme", currentTheme);
            }
            updateLocalStorageDropdown();
            renderCharts();
        });

        function toggleTheme() {
            currentTheme = (currentTheme === "dark") ? "light" : "dark";
            document.documentElement.setAttribute("data-theme", currentTheme);
            localStorage.setItem("dashboard-theme", currentTheme);
            renderCharts();
        }

        function updateChartCount(count) {
            currentChartCount = count;
            renderCharts();
        }

        function loadPredefinedMarket(marketKey) {
            if(!marketKey) return;
            activeProducts = [...marketProducts[marketKey]];
            renderCharts();
        }

        function changeSlotPair(slotIndex, selectElement) {
            const selectedOption = selectElement.options[selectElement.selectedIndex];
            activeProducts[slotIndex] = { name: selectedOption.text, pairId: selectElement.value };
            
            // Aggiorna dinamicamente l'iframe dello slot corrispondente
            const iframe = document.getElementById(`iframe_chart_${slotIndex}`);
            if(iframe) {
                iframe.src = `https://tvc-invdn-com.investing.com/web/1.28.27/index.html?pair_id=${selectElement.value}&theme=${currentTheme}&mode=advanced&interval=D`;
            }
        }

        function renderCharts() {
            const container = document.getElementById("charts-container");
            container.innerHTML = "";
            container.className = `charts-grid grid-${currentChartCount}`;

            // Lista globale per popolare i menu a tendina locali di ogni slot
            let allOptionsHtml = "";
            Object.keys(marketProducts).forEach(cat => {
                allOptionsHtml += `<optgroup label="${cat.toUpperCase()}">`;
                marketProducts[cat].forEach(p => {
                    allOptionsHtml += `<option value="${p.pairId}">${p.name}</option>`;
                });
                allOptionsHtml += `</optgroup>`;
            });

            for (let i = 0; i < currentChartCount; i++) {
                const product = activeProducts[i] || { name: "S&P 500", pairId: "166" };
                
                const card = document.createElement("div");
                card.className = "chart-card";

                const header = document.createElement("div");
                header.className = "chart-header";

                const title = document.createElement("span");
                title.className = "chart-title";
                title.innerText = `Slot ${i + 1}`;

                // Menu a tendina locale sbloccato per cambiare asset all'istante
                const select = document.createElement("select");
                select.style.padding = "2px 5px";
                select.style.fontSize = "0.75rem";
                select.innerHTML = allOptionsHtml;
                select.value = product.pairId;
                select.onchange = (e) => changeSlotPair(i, e.target);

                header.appendChild(title);
                header.appendChild(select);

                // Generazione iFrame istituzionale sbloccato (No limiti di indicatori, TF liberi)
                const iframe = document.createElement("iframe");
                iframe.id = `iframe_chart_${i}`;
                iframe.className = "iframe-container";
                iframe.src = `https://tvc-invdn-com.investing.com/web/1.28.27/index.html?pair_id=${product.pairId}&theme=${currentTheme}&mode=advanced&interval=D`;
                iframe.allowFullscreen = true;

                card.appendChild(header);
                card.appendChild(iframe);
                container.appendChild(card);
            }
        }

        /* --- GESTIONE TEMPLATE LOCAL STORAGE --- */
        function saveCurrentTemplate() {
            const nameInput = document.getElementById("template-name");
            const templateName = nameInput.value.trim();

            if (!templateName) {
                alert("Inserisci un nome per il template.");
                return;
            }

            const currentPairs = [];
            for (let i = 0; i < currentChartCount; i++) {
                const iframe = document.getElementById(`iframe_chart_${i}`);
                if (iframe) {
                    const urlParams = new URLSearchParams(iframe.src.split('?')[1]);
                    currentPairs.push({ name: "Custom Asset", pairId: urlParams.get('pair_id') || "166" });
                } else {
                    currentPairs.push({ name: "S&P 500", pairId: "166" });
                }
            }

            const templateData = {
                chartCount: currentChartCount,
                products: currentPairs
            };

            let savedTemplates = JSON.parse(localStorage.getItem("dashboard-custom-templates")) || {};
            savedTemplates[templateName] = templateData;
            localStorage.setItem("dashboard-custom-templates", JSON.stringify(savedTemplates));
            
            nameInput.value = "";
            updateLocalStorageDropdown();
            document.getElementById("template-select").value = templateName;
            alert(`Template "${templateName}" salvato!`);
        }

        function loadSavedTemplate(templateName) {
            if (!templateName) return;

            const savedTemplates = JSON.parse(localStorage.getItem("dashboard-custom-templates")) || {};
            const template = savedTemplates[templateName];

            if (template) {
                currentChartCount = template.chartCount;
                activeProducts = [...template.products];
                
                document.getElementById("chart-count").value = currentChartCount;
                document.getElementById("market-select").value = ""; 
                
                renderCharts();
            }
        }

        function deleteSelectedTemplate() {
            const select = document.getElementById("template-select");
            const selectedName = select.value;

            if (!selectedName) {
                alert("Seleziona un template da eliminare.");
                return;
            }

            if (confirm(`Eliminare il template "${selectedName}"?`)) {
                let savedTemplates = JSON.parse(localStorage.getItem("dashboard-custom-templates")) || {};
                delete savedTemplates[selectedName];
                localStorage.setItem("dashboard-custom-templates", JSON.stringify(savedTemplates));
                
                updateLocalStorageDropdown();
                renderCharts();
            }
        }

        function updateLocalStorageDropdown() {
            const select = document.getElementById("template-select");
            select.innerHTML = '<option value="" disabled selected>I tuoi Template...</option>';

            const savedTemplates = JSON.parse(localStorage.getItem("dashboard-custom-templates")) || {};
            
            Object.keys(savedTemplates).forEach(name => {
                const option = document.createElement("option");
                option.value = name;
                option.innerText = name;
                select.appendChild(option);
            });
        }
    </script>
</body>
</html>
