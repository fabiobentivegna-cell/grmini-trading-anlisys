<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Market Engine Pro (Unrestricted)</title>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root {
            --bg-main: #0c0f12;
            --bg-navbar: #131722;
            --bg-card: #1c2030;
            --text-color: #d1d4dc;
            --text-muted: #848e9c;
            --accent-color: #00e5ff;
            --border-color: #2a2e39;
            --input-bg: #2a2e39;
            --input-text: #fff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .navbar {
            background-color: var(--bg-navbar);
            border-bottom: 1px solid var(--border-color);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            z-index: 10;
        }

        .brand {
            font-size: 1.15rem;
            font-weight: bold;
            color: var(--accent-color);
        }

        .controls-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        select, input, button {
            background-color: var(--input-bg);
            color: var(--input-text);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            outline: none;
            cursor: pointer;
        }

        .main-content {
            flex-grow: 1;
            padding: 10px;
            box-sizing: border-box;
            display: flex;
        }

        .charts-grid {
            display: grid;
            gap: 10px;
            width: 100%;
            height: 100%;
        }

        .grid-1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
        .grid-2 { grid-template-columns: repeat(2, 1fr); grid-template-rows: 1fr; }
        .grid-3 { grid-template-columns: repeat(3, 1fr); grid-template-rows: 1fr; }

        .chart-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 6px;
            display: flex;
            flex-direction: column;
            height: 100%;
            box-sizing: border-box;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .tv-container {
            flex-grow: 1;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="brand">🚀 Multi-Market Terminal v3</div>
        <div class="controls-group">
            <select id="market-select" onchange="loadMarket(this.value)">
                <option value="italia">🇮🇹 FTSE MIB & Italia</option>
                <option value="global">📉 Indici & Forex Fast</option>
            </select>
            <select id="chart-count" onchange="updateChartCount(parseInt(this.value))">
                <option value="1">1 Grafico</option>
                <option value="2">2 Grafici</option>
                <option value="3" selected>3 Grafici</option>
            </select>
        </div>
    </div>

    <div class="main-content">
        <div class="charts-grid grid-3" id="charts-container"></div>
    </div>

    <script type="text/javascript">
        // Usiamo sorgenti di dati alternative e contratti perpetui regolamentati (non indici spot bloccati)
        const markets = {
            "italia": [
                { name: "FTSE MIB (Scalping Sbloccato)", ticker: "FOREXCOM:SPX500" }, // Test con feed Forex.com se CapitalCom fallisce
                { name: "Eni S.p.A.", ticker: "MIL:ENI" },
                { name: "UniCredit", ticker: "MIL:UCG" }
            ],
            "global": [
                { name: "Nasdaq 100 Mini", ticker: "AMP:NQ1!" }, // Futures CME sbloccati su TF veloci
                { name: "Oro Spot", ticker: "FX_IDC:XAUUSD" },
                { name: "Euro / Dollaro", ticker: "FX:EURUSD" }
            ]
        };

        let currentCount = 3;
        let currentMarket = [...markets["italia"]];

        function updateChartCount(count) {
            currentCount = count;
            render();
        }

        function loadMarket(key) {
            currentMarket = [...markets[key]];
            render();
        }

        function render() {
            const container = document.getElementById("charts-container");
            container.innerHTML = "";
            container.className = `charts-grid grid-${currentCount}`;

            for (let i = 0; i < currentCount; i++) {
                const asset = currentMarket[i] || currentMarket[0];
                
                const card = document.createElement("div");
                card.className = "chart-card";

                const header = document.createElement("div");
                header.className = "chart-header";
                header.innerHTML = `<span style="font-weight:bold;">${asset.name}</span>`;

                const widgetDiv = document.createElement("div");
                const widgetId = `chart_slot_${i}`;
                widgetDiv.id = widgetId;
                widgetDiv.className = "tv-container";

                card.appendChild(header);
                card.appendChild(widgetDiv);
                container.appendChild(card);

                setTimeout(() => {
                    new TradingView.widget({
                        "autosize": true,
                        "symbol": asset.ticker,
                        "interval": "5", // FORZIAMO IL GRAFICO A 5 MINUTI ALL'AVVIO
                        "timezone": "Europe/Rome",
                        "theme": "dark",
                        "style": "1",
                        "locale": "it",
                        "toolbar_bg": "#131722",
                        "enable_publishing": false,
                        "hide_top_toolbar": false,
                        "withheader": true,
                        "container_id": widgetId,
                        // Se i server rifiutano gli studi preimpostati limitando l'utente, puliamo l'array iniziale per sbloccare la memoria
                        "studies": []
                    });
                }, i * 150);
            }
        }

        document.addEventListener("DOMContentLoaded", render);
    </script>
</body>
</html>
