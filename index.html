<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Market Trading Dashboard Pro</title>
    <style>
        :root {
            --bg-main: #0c0f12;
            --bg-navbar: #131722;
            --bg-card: #1c2030;
            --text-color: #d1d4dc;
            --text-muted: #848e9c;
            --accent-color: #2962ff;
            --border-color: #2a2e39;
            --input-bg: #2a2e39;
            --input-text: #fff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .navbar {
            background-color: var(--bg-navbar);
            border-bottom: 1px solid var(--border-color);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            z-index: 10;
            box-sizing: border-box;
        }

        .brand {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-color);
        }

        .controls-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        select, input, button {
            background-color: var(--input-bg);
            color: var(--input-text);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            outline: none;
        }

        .btn-accent {
            background-color: var(--accent-color);
            color: #fff;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .main-content {
            flex-grow: 1;
            padding: 10px;
            overflow: hidden;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .charts-grid {
            display: grid;
            gap: 10px;
            width: 100%;
            height: 100%;
        }

        .grid-1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
        .grid-2 { grid-template-columns: repeat(2, 1fr); grid-template-rows: 1fr; }
        .grid-3 { grid-template-columns: repeat(3, 1fr); grid-template-rows: 1fr; }
        .grid-4 { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); }

        .chart-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            position: relative;
            box-sizing: border-box;
            height: 100%;
            width: 100%;
        }

        .tradingview-widget-container {
            height: 100%;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="brand">📊 Multi-Market Engine Pro</div>
        
        <div class="controls-group">
            <div>
                <label for="market-select">Mercato:</label>
                <select id="market-select" onchange="loadMarket(this.value)">
                    <option value="indices">📉 Indici Generali</option>
                    <option value="crypto">🪙 Crypto</option>
                    <option value="usa">🇺🇸 Azionario USA</option>
                    <option value="forex">💱 Forex</option>
                </select>
            </div>

            <div>
                <label for="chart-count">Visualizzazione:</label>
                <select id="chart-count" onchange="updateChartCount(parseInt(this.value))">
                    <option value="1">1 Grafico</option>
                    <option value="2">2 Grafici</option>
                    <option value="3">3 Grafici</option>
                    <option value="4" selected>4 Grafici</option>
                </select>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="charts-grid grid-4" id="charts-container"></div>
    </div>

    <script type="text/javascript">
        const markets = {
            indices: ["INDEX:FTSEMIB", "NASDAQ:IXIC", "SP:SPX", "XETR:DAX"],
            crypto: ["BINANCE:BTCUSDT", "BINANCE:ETHUSDT", "BINANCE:SOLUSDT", "BINANCE:XRPUSDT"],
            usa: ["NASDAQ:AAPL", "NASDAQ:TSLA", "NASDAQ:NVDA", "NASDAQ:MSFT"],
            forex: ["FX:EURUSD", "FX:GBPUSD", "FX:USDJPY", "FX:AUDUSD"]
        };

        let currentMarket = "indices";
        let currentCount = 4;

        function updateChartCount(count) {
            currentCount = count;
            renderCharts();
        }

        function loadMarket(marketKey) {
            currentMarket = marketKey;
            renderCharts();
        }

        function renderCharts() {
            const container = document.getElementById("charts-container");
            container.innerHTML = "";
            container.className = `charts-grid grid-${currentCount}`;

            const selectedSymbols = markets[currentMarket];

            for (let i = 0; i < currentCount; i++) {
                const symbol = selectedSymbols[i] || selectedSymbols[0];
                
                const card = document.createElement("div");
                card.className = "chart-card";

                const widgetContainer = document.createElement("div");
                widgetContainer.className = "tradingview-widget-container";
                
                const iframe = document.createElement("iframe");
                iframe.style.width = "100%";
                iframe.style.height = "100%";
                iframe.style.border = "none";
                
                // Utilizzo dell'embed di snapshot avanzato che bypassa i blocchi CORS e i cookie dell'account Free
                iframe.src = `https://s.tradingview.com/widgetembed/?frameElementId=tradingview_chart&symbol=${encodeURIComponent(symbol)}&interval=D&symboledit=1&saveimage=1&toolbarbg=131722&studies=%5B%5D&theme=dark&style=1&timezone=Europe%2FRome&studies_overrides=%7B%7D&overrides=%7B%7D&enabled_features=%5B%5D&disabled_features=%5B%5D&locale=it&utm_source=localhost&utm_medium=widget&utm_campaign=chart&utm_term=${encodeURIComponent(symbol)}`;
                
                widgetContainer.appendChild(iframe);
                card.appendChild(widgetContainer);
                container.appendChild(card);
            }
        }

        // Avvio iniziale automatico
        document.addEventListener("DOMContentLoaded", renderCharts);
    </script>
</body>
</html>
