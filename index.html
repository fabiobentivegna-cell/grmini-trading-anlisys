<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Multi-Chart Dashboard Pro (eToro Engine)</title>
    <style>
        :root {
            --bg-main: #0c0f12;
            --bg-navbar: #131722;
            --bg-card: #1c2030;
            --text-color: #d1d4dc;
            --text-muted: #848e9c;
            --accent-color: #4bff62; /* Colore eToro Green */
            --border-color: #2a2e39;
            --input-bg: #2a2e39;
            --input-text: #fff;
            --select-text: #fff;
        }

        [data-theme="light"] {
            --bg-main: #f0f2f5;
            --bg-navbar: #ffffff;
            --bg-card: #ffffff;
            --text-color: #1e222d;
            --text-muted: #707a8a;
            --accent-color: #00b018;
            --border-color: #e0e3eb;
            --input-bg: #ffffff;
            --input-text: #1e222d;
            --select-text: #1e222d;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        .navbar {
            background-color: var(--bg-navbar);
            border-bottom: 1px solid var(--border-color);
            padding: 10px 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            z-index: 10;
            box-sizing: border-box;
        }

        .brand {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-color);
        }

        .controls-group {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        select, input, button {
            background-color: var(--input-bg);
            color: var(--select-text);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            outline: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        input {
            color: var(--input-text);
            cursor: text;
        }

        button {
            font-weight: 500;
        }

        button:hover {
            opacity: 0.9;
        }

        .btn-accent {
            background-color: var(--accent-color);
            color: #000;
            font-weight: bold;
            border: none;
        }

        .main-content {
            flex-grow: 1;
            padding: 12px;
            overflow: hidden;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .charts-grid {
            display: grid;
            gap: 12px;
            width: 100%;
            height: 100%;
            flex-grow: 1;
        }

        .grid-1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
        .grid-2 { grid-template-columns: repeat(2, 1fr); grid-template-rows: 1fr; }
        .grid-3 { grid-template-columns: repeat(3, 1fr); grid-template-rows: 1fr; }
        .grid-4 { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); }
        .grid-5 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }
        .grid-6 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }

        .chart-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 6px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            height: 100%;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            padding: 0 4px;
        }

        .chart-title {
            font-size: 0.9rem;
            font-weight: 600;
        }

        .iframe-container {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 4px;
            background-color: #131722;
        }

        .template-section {
            border-left: 1px solid var(--border-color);
            padding-left: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="brand">📊 Multi-Market Engine Pro (eToro Base)</div>
        
        <div class="controls-group">
            <div>
                <label for="market-select">Mercato:</label>
                <select id="market-select" onchange="loadPredefinedMarket(this.value)">
                    <option value="indices">📉 Indici Mondiali</option>
                    <option value="crypto">🪙 Crypto</option>
                    <option value="usa">🇺🇸 Azionario USA</option>
                    <option value="italia">🇮🇹 Azionario Italia</option>
                    <option value="forex">💱 Forex</option>
                    <option value="commodities">🛢️ Commodities</option>
                </select>
            </div>

            <div>
                <label for="chart-count">Grafici (1-6):</label>
                <select id="chart-count" onchange="updateChartCount(parseInt(this.value))">
                    <option value="1">1 Grafico</option>
                    <option value="2">2 Grafici</option>
                    <option value="3" selected>3 Grafici</option>
                    <option value="4">4 Grafici</option>
                    <option value="5">5 Grafici</option>
                    <option value="6">6 Grafici</option>
                </select>
            </div>

            <button onclick="toggleTheme()">🌓 Cambia Tema</button>
        </div>

        <div class="controls-group template-section">
            <div>
                <input type="text" id="template-name" placeholder="Nome template...">
                <button class="btn-accent" onclick="saveCurrentTemplate()">Salva Custom</button>
            </div>
            <div>
                <select id="template-select" onchange="loadSavedTemplate(this.value)">
                    <option value="" disabled selected>I tuoi Template...</option>
                </select>
                <button onclick="deleteSelectedTemplate()" style="color: #ff4d4f;">Elimina</button>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="charts-grid grid-3" id="charts-container"></div>
    </div>

    <script type="text/javascript">
        // Mappatura ID simboli ufficiali eToro (Senza alcuna limitazione di flussi)
        const marketProducts = {
            "indices": [
                { name: "FTSE MIB (Italia)", symbol: "1040" },
                { name: "Nasdaq 100", symbol: "1004" },
                { name: "S&P 500", symbol: "1001" },
                { name: "DAX 40", symbol: "1003" },
                { name: "Dow Jones 30", symbol: "1002" },
                { name: "Nikkei 225", symbol: "1007" }
            ],
            "crypto": [
                { name: "Bitcoin", symbol: "100000" },
                { name: "Ethereum", symbol: "100001" },
                { name: "Solana", symbol: "100024" },
                { name: "Ripple", symbol: "100002" },
                { name: "Cardano", symbol: "100013" },
                { name: "Binance Coin", symbol: "100022" }
            ],
            "usa": [
                { name: "Apple", symbol: "1" },
                { name: "Tesla", symbol: "4057" },
                { name: "NVIDIA", symbol: "1009" },
                { name: "Microsoft", symbol: "4" },
                { name: "Amazon", symbol: "3" },
                { name: "Meta (Facebook)", symbol: "3051" }
            ],
            "italia": [
                { name: "Eni", symbol: "2079" },
                { name: "UniCredit", symbol: "2121" },
                { name: "Intesa Sanpaolo", symbol: "2094" },
                { name: "Enel", symbol: "2078" },
                { name: "Ferrari", symbol: "4444" },
                { name: "Stellantis", symbol: "2081" }
            ],
            "forex": [
                { name: "EUR / USD", symbol: "7" },
                { name: "GBP / USD", symbol: "2" },
                { name: "USD / JPY", symbol: "4" },
                { name: "AUD / USD", symbol: "5" },
                { name: "EUR / GBP", symbol: "11" },
                { name: "USD / CAD", symbol: "6" }
            ],
            "commodities": [
                { name: "Oro (Gold)", symbol: "10" },
                { name: "Petrolio (Oil)", symbol: "11" },
                { name: "Gas Naturale", symbol: "13" },
                { name: "Argento (Silver)", symbol: "12" },
                { name: "Rame", symbol: "14" },
                { name: "Platino", symbol: "15" }
            ]
        };

        let currentTheme = "dark";
        let currentChartCount = 3;
        let activeProducts = [...marketProducts["indices"]]; 

        document.addEventListener("DOMContentLoaded", function() {
            if (localStorage.getItem("dashboard-theme")) {
                currentTheme = localStorage.getItem("dashboard-theme");
                document.documentElement.setAttribute("data-theme", currentTheme);
            }
            updateLocalStorageDropdown();
            renderCharts();
        });

        function toggleTheme() {
            currentTheme = (currentTheme === "dark") ? "light" : "dark";
            document.documentElement.setAttribute("data-theme", currentTheme);
            localStorage.setItem("dashboard-theme", currentTheme);
            renderCharts();
        }

        function updateChartCount(count) {
            currentChartCount = count;
            renderCharts();
        }

        function loadPredefinedMarket(marketKey) {
            if(!marketKey) return;
            activeProducts = [...marketProducts[marketKey]];
            renderCharts();
        }

        function changeSlotTicker(slotIndex, newId) {
            activeProducts[slotIndex] = { name: "Custom Asset", symbol: newId.trim() };
            renderCharts();
        }

        function renderCharts() {
            const container = document.getElementById("charts-container");
            container.innerHTML = "";
            container.className = `charts-grid grid-${currentChartCount}`;

            const themeMode = currentTheme === "dark" ? "dark" : "light";

            for (let i = 0; i < currentChartCount; i++) {
                const product = activeProducts[i] || { name: "FTSE MIB", symbol: "1040" };
                
                const card = document.createElement("div");
                card.className = "chart-card";

                const header = document.createElement("div");
                header.className = "chart-header";

                const title = document.createElement("span");
                title.className = "chart-title";
                title.innerText = `${product.name}`;

                const input = document.createElement("input");
                input.type = "text";
                input.value = product.symbol;
                input.placeholder = "ID eToro...";
                input.style.width = "80px";
                input.style.fontSize = "0.75rem";
                input.style.padding = "3px 6px";
                input.onchange = (e) => changeSlotTicker(i, e.target.value);

                header.appendChild(title);
                header.appendChild(input);

                // ENGINE INTEGRATO ETORO: Caricamento asincrono sbloccato senza restrizioni
                const iframe = document.createElement("iframe");
                iframe.className = "iframe-container";
                // L'applicazione richiama l'interfaccia di analisi eToro a pieno schermo
                iframe.src = `https://etoro.tw/charts/web/index.html?instrumentId=${product.symbol}&theme=${themeMode}&locale=it`;
                iframe.allowFullscreen = true;

                card.appendChild(header);
                card.appendChild(iframe);
                container.appendChild(card);
            }
        }

        /* --- LOGICA DI SALVATAGGIO DEI TEMPLATE --- */
        function saveCurrentTemplate() {
            const nameInput = document.getElementById("template-name");
            const templateName = nameInput.value.trim();
            if (!templateName) return;

            const templateData = {
                chartCount: currentChartCount,
                products: activeProducts.slice(0, currentChartCount)
            };

            let savedTemplates = JSON.parse(localStorage.getItem("dashboard-custom-templates")) || {};
            savedTemplates[templateName] = templateData;
            localStorage.setItem("dashboard-custom-templates", JSON.stringify(savedTemplates));
            
            nameInput.value = "";
            updateLocalStorageDropdown();
            document.getElementById("template-select").value = templateName;
            alert(`Template "${templateName}" salvato!`);
        }

        function loadSavedTemplate(templateName) {
            if (!templateName) return;
            const savedTemplates = JSON.parse(localStorage.getItem("dashboard-custom-templates")) || {};
            const template = savedTemplates[templateName];
            if (template) {
                currentChartCount = template.chartCount;
                activeProducts = [...template.products];
                document.getElementById("chart-count").value = currentChartCount;
                renderCharts();
            }
        }

        function deleteSelectedTemplate() {
            const select = document.getElementById("template-select");
            const name = select.value;
            if (!name) return;
            if (confirm(`Eliminare "${name}"?`)) {
                let savedTemplates = JSON.parse(localStorage.getItem("dashboard-custom-templates")) || {};
                delete savedTemplates[name];
                localStorage.setItem("dashboard-custom-templates", JSON.stringify(savedTemplates));
                updateLocalStorageDropdown();
                renderCharts();
            }
        }

        function updateLocalStorageDropdown() {
            const select = document.getElementById("template-select");
            select.innerHTML = '<option value="" disabled selected>I tuoi Template...</option>';
            const savedTemplates = JSON.parse(localStorage.getItem("dashboard-custom-templates")) || {};
            Object.keys(savedTemplates).forEach(name => {
                const option = document.createElement("option");
                option.value = name; option.innerText = name;
                select.appendChild(option);
            });
        }
    </script>
</body>
</html>
