<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Dashboard Trading Pro Sbloccata</title>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root {
            --bg-main: #0c0f12;
            --bg-navbar: #131722;
            --bg-card: #1c2030;
            --text-color: #d1d4dc;
            --text-muted: #848e9c;
            --accent-color: #2962ff;
            --border-color: #2a2e39;
            --input-bg: #2a2e39;
            --input-text: #fff;
        }

        [data-theme="light"] {
            --bg-main: #f0f2f5;
            --bg-navbar: #ffffff;
            --bg-card: #ffffff;
            --text-color: #1e222d;
            --text-muted: #707a8a;
            --accent-color: #2962ff;
            --border-color: #e0e3eb;
            --input-bg: #f0f2f5;
            --input-text: #1e222d;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        .navbar {
            background-color: var(--bg-navbar);
            border-bottom: 1px solid var(--border-color);
            padding: 10px 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            z-index: 10;
            box-sizing: border-box;
        }

        .brand {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-color);
        }

        .controls-group {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        select, input, button {
            background-color: var(--input-bg);
            color: var(--input-text);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s;
        }

        select:focus, input:focus {
            border-color: var(--accent-color);
        }

        button {
            cursor: pointer;
            font-weight: 500;
        }

        button:hover {
            opacity: 0.9;
        }

        .btn-accent {
            background-color: var(--accent-color);
            color: #fff;
            border: none;
        }

        .theme-toggle-btn {
            font-size: 1.1rem;
            padding: 4px 10px;
        }

        .main-content {
            flex-grow: 1;
            padding: 10px;
            overflow: hidden;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .charts-grid {
            display: grid;
            gap: 10px;
            width: 100%;
            height: 100%;
            flex-grow: 1;
        }

        .grid-1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
        .grid-2 { grid-template-columns: repeat(2, 1fr); grid-template-rows: 1fr; }
        .grid-3 { grid-template-columns: repeat(3, 1fr); grid-template-rows: 1fr; }
        .grid-4 { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); }
        .grid-5 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }
        .grid-6 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }

        .chart-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 2px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            height: 100%;
        }

        .tv-container {
            flex-grow: 1;
            width: 100%;
            height: 100%;
        }

        .template-section {
            border-left: 1px solid var(--border-color);
            padding-left: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="brand">📊 Multi-Market Dash Pro</div>
        
        <div class="controls-group">
            <div>
                <label for="market-select">Mercato:</label>
                <select id="market-select" onchange="loadPredefinedMarket(this.value)">
                    <option value="indices">📉 Indici Mondiali</option>
                    <option value="crypto">🪙 Crypto</option>
                    <option value="usa">🇺🇸 Azionario USA</option>
                    <option value="italia">🇮🇹 Azionario Italia</option>
                    <option value="forex">💱 Forex</option>
                    <option value="commodities">🛢️ Commodities</option>
                </select>
            </div>

            <div>
                <label for="chart-count">Grafici:</label>
                <select id="chart-count" onchange="updateChartCount(parseInt(this.value))">
                    <option value="1">1 Grafico</option>
                    <option value="2">2 Grafici</option>
                    <option value="3" selected>3 Grafici</option>
                    <option value="4">4 Grafici</option>
                    <option value="5">5 Grafici</option>
                    <option value="6">6 Grafici</option>
                </select>
            </div>

            <button class="theme-toggle-btn" onclick="toggleTheme()">🌓</button>
        </div>

        <div class="controls-group template-section">
            <div>
                <input type="text" id="template-name" placeholder="Nome template...">
                <button class="btn-accent" onclick="saveCurrentTemplate()">Salva Custom</button>
            </div>
            <div>
                <select id="template-select" onchange="loadSavedTemplate(this.value)">
                    <option value="" disabled selected>I tuoi Template...</option>
                </select>
                <button onclick="deleteSelectedTemplate()" style="color: #ff4d4f;">Elimina</button>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="charts-grid grid-3" id="charts-container"></div>
    </div>

    <script type="text/javascript">
        // Ticker ad altissima compatibilità per mercati multichart
        const marketProducts = {
            "indices": [
                { ticker: "INDEX:FTSEMIB" },
                { ticker: "NASDAQ:IXIC" },
                { ticker: "SP:SPX" },
                { ticker: "XETR:DAX" },
                { ticker: "DJ:DJI" },
                { ticker: "INDEX:NKY" }
            ],
            "crypto": [
                { ticker: "BINANCE:BTCUSDT" },
                { ticker: "BINANCE:ETHUSDT" },
                { ticker: "BINANCE:SOLUSDT" }
            ],
            "usa": [
                { ticker: "AAPL" }, { ticker: "TSLA" }, { ticker: "NVDA" }
            ],
            "italia": [
                { ticker: "MIL:ENI" }, { ticker: "MIL:UCG" }, { ticker: "MIL:ISP" }
            ],
            "forex": [
                { ticker: "FX:EURUSD" }, { ticker: "FX:GBPUSD" }, { ticker: "FX:USDJPY" }
            ],
            "commodities": [
                { ticker: "TVC:GOLD" }, { ticker: "TVC:USOIL" }, { ticker: "TVC:NG1!" }
            ]
        };

        let currentTheme = "dark";
        let currentChartCount = 3;
        let activeProducts = [...marketProducts["indices"]]; 

        document.addEventListener("DOMContentLoaded", function() {
            if (localStorage.getItem("dashboard-theme")) {
                currentTheme = localStorage.getItem("dashboard-theme");
                document.documentElement.setAttribute("data-theme", currentTheme);
            }
            updateLocalStorageDropdown();
            renderCharts();
        });

        function toggleTheme() {
            currentTheme = (currentTheme === "dark") ? "light" : "dark";
            document.documentElement.setAttribute("data-theme", currentTheme);
            localStorage.setItem("dashboard-theme", currentTheme);
            renderCharts();
        }

        function updateChartCount(count) {
            currentChartCount = count;
            renderCharts();
        }

        function loadPredefinedMarket(marketKey) {
            if(!marketKey) return;
            activeProducts = [...marketProducts[marketKey]];
            renderCharts();
        }

        function renderCharts() {
            const container = document.getElementById("charts-container");
            container.innerHTML = "";
            container.className = `charts-grid grid-${currentChartCount}`;

            for (let i = 0; i < currentChartCount; i++) {
                const product = activeProducts[i] || { ticker: "INDEX:FTSEMIB" };
                
                const card = document.createElement("div");
                card.className = "chart-card";

                const widgetDiv = document.createElement("div");
                const widgetId = `tv_chart_${i}`;
                widgetDiv.id = widgetId;
                widgetDiv.className = "tv-container";

                card.appendChild(widgetDiv);
                container.appendChild(card);

                // Delay millimetrico per non intasare le richieste e sbloccare i Timeframe
                setTimeout(() => {
                    new TradingView.widget({
                        "autosize": true,
                        "symbol": product.ticker,
                        "interval": "D",
                        "timezone": "Europe/Rome",
                        "theme": currentTheme,
                        "style": "1",
                        "locale": "it",
                        "enable_publishing": false,
                        "withheader": true,            // Sblocca la barra superiore
                        "allow_symbol_change": true,   // Sblocca la ricerca prodotti cliccando sul Ticker
                        "hide_side_toolbar": false,    // Sblocca i disegni a sinistra
                        "container_id": widgetId
                    });
                }, i * 150);
            }
        }

        /* --- TEMPLATE MANAGEMENT --- */
        function saveCurrentTemplate() {
            const nameInput = document.getElementById("template-name");
            const templateName = nameInput.value.trim();
            if (!templateName) return;

            const templateData = {
                chartCount: currentChartCount,
                products: activeProducts.slice(0, currentChartCount)
            };

            let savedTemplates = JSON.parse(localStorage.getItem("dashboard-custom-templates")) || {};
            savedTemplates[templateName] = templateData;
            localStorage.setItem("dashboard-custom-templates", JSON.stringify(savedTemplates));
            nameInput.value = "";
            updateLocalStorageDropdown();
            alert("Template salvato!");
        }

        function loadSavedTemplate(templateName) {
            const savedTemplates = JSON.parse(localStorage.getItem("dashboard-custom-templates")) || {};
            const template = savedTemplates[templateName];
            if (template) {
                currentChartCount = template.chartCount;
                activeProducts = [...template.products];
                document.getElementById("chart-count").value = currentChartCount;
                renderCharts();
            }
        }

        function deleteSelectedTemplate() {
            const name = document.getElementById("template-select").value;
            if (!name) return;
            let savedTemplates = JSON.parse(localStorage.getItem("dashboard-custom-templates")) || {};
            delete savedTemplates[name];
            localStorage.setItem("dashboard-custom-templates", JSON.stringify(savedTemplates));
            updateLocalStorageDropdown();
            renderCharts();
        }

        function updateLocalStorageDropdown() {
            const select = document.getElementById("template-select");
            select.innerHTML = '<option value="" disabled selected>I tuoi Template...</option>';
            const savedTemplates = JSON.parse(localStorage.getItem("dashboard-custom-templates")) || {};
            Object.keys(savedTemplates).forEach(name => {
                const option = document.createElement("option");
                option.value = name; option.innerText = name;
                select.appendChild(option);
            });
        }
    </script>
</body>
</html>
