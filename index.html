<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Dashboard Avanzata</title>
    <!-- Script ufficiale di TradingView per i grafici avanzati -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        /* Variabili CSS per la gestione dinamica del Tema (Chiaro/Scuro) */
        :root {
            --bg-main: #0c0f12;
            --bg-navbar: #131722;
            --bg-card: #1c2030;
            --text-color: #d1d4dc;
            --text-muted: #848e9c;
            --accent-color: #2962ff;
            --border-color: #2a2e39;
            --input-bg: #2a2e39;
            --input-text: #fff;
        }

        [data-theme="light"] {
            --bg-main: #f0f2f5;
            --bg-navbar: #ffffff;
            --bg-card: #ffffff;
            --text-color: #1e222d;
            --text-muted: #707a8a;
            --accent-color: #2962ff;
            --border-color: #e0e3eb;
            --input-bg: #f0f2f5;
            --input-text: #1e222d;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Barra di Controllo Superiore (Navbar) */
        .navbar {
            background-color: var(--bg-navbar);
            border-bottom: 1px solid var(--border-color);
            padding: 10px 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            z-index: 10;
            box-sizing: border-box;
        }

        .brand {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-color);
        }

        .controls-group {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        select, input, button {
            background-color: var(--input-bg);
            color: var(--input-text);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s;
        }

        select:focus, input:focus {
            border-color: var(--accent-color);
        }

        button {
            cursor: pointer;
            font-weight: 500;
        }

        button:hover {
            opacity: 0.9;
        }

        .btn-accent {
            background-color: var(--accent-color);
            color: #fff;
            border: none;
        }

        .theme-toggle-btn {
            font-size: 1.1rem;
            padding: 4px 10px;
        }

        /* Area Principale dei Grafici */
        .main-content {
            flex-grow: 1;
            padding: 15px;
            overflow-y: auto;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        /* Griglia Dinamica per i Grafici */
        .charts-grid {
            display: grid;
            gap: 15px;
            width: 100%;
            height: 100%;
            flex-grow: 1;
        }

        /* Classi CSS per gestire il numero di grafici (da 1 a 6) */
        .grid-1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
        .grid-2 { grid-template-columns: repeat(2, 1fr); grid-template-rows: 1fr; }
        .grid-3 { grid-template-columns: repeat(3, 1fr); grid-template-rows: 1fr; }
        .grid-4 { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); }
        .grid-5 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }
        .grid-6 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }

        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr !important;
                grid-template-rows: auto !important;
            }
        }

        .chart-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            min-height: 300px;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .chart-title {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .tv-widget-container {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            border-radius: 4px;
            overflow: hidden;
        }

        /* Sezione Gestione Template */
        .template-section {
            border-left: 1px solid var(--border-color);
            padding-left: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>

    <!-- Barra Superiore di Controllo -->
    <div class="navbar">
        <div class="brand">📈 Multi-Market Dash</div>
        
        <div class="controls-group">
            <!-- Menu a tendina per i Mercati Predefiniti -->
            <div>
                <label for="market-select">Mercato:</label>
                <select id="market-select" onchange="loadPredefinedMarket(this.value)">
                    <option value="crypto">🪙 Crypto</option>
                    <option value="usa">🇺🇸 Azionario USA</option>
                    <option value="italia">🇮🇹 Azionario Italia</option>
                    <option value="forex">💱 Forex</option>
                    <option value="commodities">🛢️ Commodities</option>
                </select>
            </div>

            <!-- Selettore del Numero di Grafici (1-6) -->
            <div>
                <label for="chart-count">Grafici (1-6):</label>
                <select id="chart-count" onchange="updateChartCount(parseInt(this.value))">
                    <option value="1">1 Grafico</option>
                    <option value="2">2 Grafici</option>
                    <option value="3" selected>3 Grafici</option>
                    <option value="4">4 Grafici</option>
                    <option value="5">5 Grafici</option>
                    <option value="6">6 Grafici</option>
                </select>
            </div>

            <!-- Interruttore del Tema Chiaro/Scuro -->
            <button class="theme-toggle-btn" onclick="toggleTheme()" title="Cambia Tema">🌓</button>
        </div>

        <!-- Sezione Salvataggio e Caricamento Template Personali -->
        <div class="controls-group template-section">
            <div>
                <input type="text" id="template-name" placeholder="Nome template...">
                <button class="btn-accent" onclick="saveCurrentTemplate()">Salva Custom</button>
            </div>
            <div>
                <select id="template-select" onchange="loadSavedTemplate(this.value)">
                    <option value="" disabled selected>I tuoi Template...</option>
                </select>
                <button onclick="deleteSelectedTemplate()" style="color: #ff4d4f;">Elimina</button>
            </div>
        </div>
    </div>

    <!-- Contenitore Principale della Griglia dei Grafici -->
    <div class="main-content">
        <div class="charts-grid grid-3" id="charts-container">
            <!-- I grafici vengono inseriti qui dinamicamente -->
        </div>
    </div>

    <script type="text/javascript">
        // Database dei prodotti finanziari predefiniti
        const marketProducts = {
            "crypto": [
                { name: "Bitcoin", ticker: "BINANCE:BTCUSDT" },
                { name: "Ethereum", ticker: "BINANCE:ETHUSDT" },
                { name: "Solana", ticker: "BINANCE:SOLUSDT" },
                { name: "Ripple", ticker: "BINANCE:XRPUSDT" },
                { name: "Cardano", ticker: "BINANCE:ADAUSDT" },
                { name: "BNB", ticker: "BINANCE:BNBUSDT" }
            ],
            "usa": [
                { name: "S&P 500", ticker: "SPIMS:SPX" },
                { name: "NASDAQ 100", ticker: "NASDAQ:NDX" },
                { name: "Apple", ticker: "NASDAQ:AAPL" },
                { name: "Tesla", ticker: "NASDAQ:TSLA" },
                { name: "NVIDIA", ticker: "NASDAQ:NVDA" },
                { name: "Microsoft", ticker: "NASDAQ:MSFT" }
            ],
            "italia": [
                { name: "FTSE MIB Index", ticker: "INDEX:FTSEMIB" },
                { name: "Eni S.p.A.", ticker: "MIL:ENI" },
                { name: "UniCredit", ticker: "MIL:UCG" },
                { name: "Intesa Sanpaolo", ticker: "MIL:ISP" },
                { name: "Enel", ticker: "MIL:ENEL" },
                { name: "Ferrari", ticker: "MIL:RACE" }
            ],
            "forex": [
                { name: "EUR / USD", ticker: "FX:EURUSD" },
                { name: "GBP / USD", ticker: "FX:GBPUSD" },
                { name: "USD / JPY", ticker: "FX:USDJPY" },
                { name: "AUD / USD", ticker: "FX:AUDUSD" },
                { name: "EUR / GBP", ticker: "FX:EURGBP" },
                { name: "USD / CAD", ticker: "FX:USDCAD" }
            ],
            "commodities": [
                { name: "Oro (Gold)", ticker: "TVC:GOLD" },
                { name: "Petrolio (Crude Oil)", ticker: "TVC:USOIL" },
                { name: "Gas Naturale", ticker: "TVC:NG1!" },
                { name: "Argento (Silver)", ticker: "TVC:SILVER" },
                { name: "Rame (Copper)", ticker: "COMEX:HG1!" },
                { name: "Platino", ticker: "NYMEX:PL1!" }
            ]
        };

        // Stato globale dell'applicazione
        let currentTheme = "dark";
        let currentChartCount = 3;
        // Array dei prodotti attualmente visualizzati nei vari slot (fino a 6 elementi)
        let activeProducts = [...marketProducts["crypto"]]; 

        // Inizializzazione al caricamento della pagina
        document.addEventListener("DOMContentLoaded", function() {
            // Carica l'eventuale tema salvato nel browser
            if (localStorage.getItem("dashboard-theme")) {
                currentTheme = localStorage.getItem("dashboard-theme");
                document.documentElement.setAttribute("data-theme", currentTheme);
            }
            
            updateLocalStorageDropdown();
            renderCharts();
        });

        // Funzione per cambiare il Tema (Chiaro / Scuro)
        function toggleTheme() {
            currentTheme = (currentTheme === "dark") ? "light" : "dark";
            document.documentElement.setAttribute("data-theme", currentTheme);
            localStorage.setItem("dashboard-theme", currentTheme);
            // I widget di TradingView richiedono il reload per aggiornare il tema interno
            renderCharts();
        }

        // Modifica del numero di grafici visualizzati
        function updateChartCount(count) {
            currentChartCount = count;
            renderCharts();
        }

        // Caricamento dei mercati dal menu a tendina predefinito
        function loadPredefinedMarket(marketKey) {
            activeProducts = [...marketProducts[marketKey]];
            renderCharts();
        }

        // Funzione di cambio ticker dinamico per il singolo slot del grafico
        function changeSlotTicker(slotIndex, newTicker) {
            activeProducts[slotIndex] = { name: newTicker.split(':')[1] || newTicker, ticker: newTicker };
            // Rigenera solo quel grafico specifico per performance ottimale
            initTradingViewWidget(`tv_widget_${slotIndex}`, newTicker);
        }

        // Rendering e calcolo della griglia dei grafici
        function renderCharts() {
            const container = document.getElementById("charts-container");
            container.innerHTML = "";
            
            // Aggiorna le classi CSS della griglia in base al numero di grafici scelti
            container.className = `charts-grid grid-${currentChartCount}`;

            for (let i = 0; i < currentChartCount; i++) {
                const product = activeProducts[i] || { name: "Seleziona Prodotto", ticker: "BINANCE:BTCUSDT" };
                
                // Crea la card contenitore del grafico
                const card = document.createElement("div");
                card.className = "chart-card";

                // Barra di controllo interna alla card del grafico
                const header = document.createElement("div");
                header.className = "chart-header";

                const title = document.createElement("span");
                title.className = "chart-title";
                title.innerText = `Slot ${i + 1}: ${product.name}`;

                // Input per cambiare prodotto al volo nello specifico slot
                const input = document.createElement("input");
                input.type = "text";
                input.value = product.ticker;
                input.placeholder = "Es: BINANCE:ETHUSDT";
                input.style.width = "140px";
                input.style.fontSize = "0.8rem";
                input.style.padding = "3px 6px";
                input.onchange = (e) => changeSlotTicker(i, e.target.value);

                header.appendChild(title);
                header.appendChild(input);

                // Div per il Widget TradingView
                const widgetDiv = document.createElement("div");
                const widgetId = `tv_widget_${i}`;
                widgetDiv.id = widgetId;
                widgetDiv.className = "tv-widget-container";

                card.appendChild(header);
                card.appendChild(widgetDiv);
                container.appendChild(card);

                // Inizializza il widget grafico
                initTradingViewWidget(widgetId, product.ticker);
            }
        }

        // Inizializzazione dell'oggetto TradingView originale
        function initTradingViewWidget(divId, ticker) {
            new TradingView.widget({
                "autosize": true,
                "symbol": ticker,
                "interval": "D",
                "timezone": "Europe/Rome",
                "theme": currentTheme,
                "style": "1",
                "locale": "it",
                "toolbar_bg": currentTheme === "dark" ? "#131722" : "#f1f3f6",
                "enable_publishing": false,
                "hide_side_toolbar": false,
                "allow_symbol_change": true,
                "container_id": divId,
                "studies": [
                    "RSI@tv-basicstudies",
                    "MASimple@tv-basicstudies"
                ]
            });
        }

        /* --- LOGICA DI GESTIONE DEI TEMPLATE (LOCAL STORAGE) --- */

        // Salva il template configurato dall'utente
        function saveCurrentTemplate() {
            const nameInput = document.getElementById("template-name");
            const templateName = nameInput.value.trim();

            if (!templateName) {
                alert("Per favore, inserisci un nome valido per il template prima di salvare.");
                return;
            }

            // Crea l'oggetto strutturato da salvare
            const templateData = {
                chartCount: currentChartCount,
                products: activeProducts.slice(0, currentChartCount)
            };

            // Recupera i template vecchi o ne inizializza uno nuovo
            let savedTemplates = JSON.parse(localStorage.getItem("dashboard-custom-templates")) || {};
            savedTemplates[templateName] = templateData;

            // Salva nel LocalStorage del browser
            localStorage.setItem("dashboard-custom-templates", JSON.stringify(savedTemplates));
            
            nameInput.value = "";
            updateLocalStorageDropdown();
            document.getElementById("template-select").value = templateName;
            alert(`Template "${templateName}" salvato con successo!`);
        }

        // Carica un template precedentemente salvato
        function loadSavedTemplate(templateName) {
            if (!templateName) return;

            const savedTemplates = JSON.parse(localStorage.getItem("dashboard-custom-templates")) || {};
            const template = savedTemplates[templateName];

            if (template) {
                currentChartCount = template.chartCount;
                activeProducts = [...template.products];
                
                // Sincronizza i selettori grafici della barra superiore
                document.getElementById("chart-count").value = currentChartCount;
                document.getElementById("market-select").value = ""; // Resetta selezione mercato predefinita
                
                renderCharts();
            }
        }

        // Elimina il template personalizzato selezionato
        function deleteSelectedTemplate() {
            const select = document.getElementById("template-select");
            const selectedName = select.value;

            if (!selectedName) {
                alert("Seleziona prima un template dall'elenco per poterlo eliminare.");
                return;
            }

            if (confirm(`Sei sicuro di voler eliminare il template "${selectedName}"?`)) {
                let savedTemplates = JSON.parse(localStorage.getItem("dashboard-custom-templates")) || {};
                delete savedTemplates[selectedName];
                localStorage.setItem("dashboard-custom-templates", JSON.stringify(savedTemplates));
                
                updateLocalStorageDropdown();
                renderCharts();
            }
        }

        // Aggiorna le opzioni disponibili nel menu a tendina dei template personalizzati
        function updateLocalStorageDropdown() {
            const select = document.getElementById("template-select");
            select.innerHTML = '<option value="" disabled selected>I tuoi Template...</option>';

            const savedTemplates = JSON.parse(localStorage.getItem("dashboard-custom-templates")) || {};
            
            Object.keys(savedTemplates).forEach(name => {
                const option = document.createElement("option");
                option.value = name;
                option.innerText = name;
                select.appendChild(option);
            });
        }
    </script>
</body>
</html>
