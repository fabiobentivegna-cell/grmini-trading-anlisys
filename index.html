<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Live Analyzer</title>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #080b0e;
            --bg-bar: #0d1117;
            --bg-panel: #0d1117;
            --bg-card: #0d1117;
            --bg-card-header: #111820;
            --bg-input: #161c24;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #484f58;
            --accent: #00d4aa;
            --accent-dim: rgba(0, 212, 170, 0.12);
            --accent-blue: #388bfd;
            --accent-red: #ff4d4f;
            --accent-yellow: #f0c040;
            --border: #21262d;
            --border-accent: rgba(0, 212, 170, 0.3);
            --shadow: 0 0 0 1px var(--border);
            --font-mono: 'IBM Plex Mono', monospace;
            --font-sans: 'IBM Plex Sans', sans-serif;
        }

        [data-theme="light"] {
            --bg-main: #f5f6fa;
            --bg-bar: #ffffff;
            --bg-panel: #ffffff;
            --bg-card: #ffffff;
            --bg-card-header: #f0f2f7;
            --bg-input: #eef0f6;
            --text-primary: #1c2333;
            --text-secondary: #57606a;
            --text-muted: #afb8c1;
            --accent: #0fa882;
            --accent-dim: rgba(15, 168, 130, 0.08);
            --accent-blue: #0969da;
            --border: #d0d7de;
            --border-accent: rgba(15, 168, 130, 0.3);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-sans);
            background: var(--bg-main);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ─── TOP STATUS BAR ─────────────────────────────────── */
        .statusbar {
            background: var(--bg-bar);
            border-bottom: 1px solid var(--border);
            height: 36px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 20px;
            font-family: var(--font-mono);
            font-size: 0.68rem;
            flex-shrink: 0;
            overflow: hidden;
        }

        .statusbar-brand {
            color: var(--accent);
            font-weight: 600;
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .statusbar-brand::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,212,170,0.4); }
            50% { opacity: 0.7; box-shadow: 0 0 0 4px rgba(0,212,170,0); }
        }

        .statusbar-time {
            color: var(--text-secondary);
            margin-left: auto;
            white-space: nowrap;
        }

        .statusbar-sep {
            color: var(--border);
        }

        /* ─── MAIN TOOLBAR ───────────────────────────────────── */
        .toolbar {
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            flex-shrink: 0;
            z-index: 10;
        }

        .toolbar-section {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .toolbar-sep {
            width: 1px;
            height: 22px;
            background: var(--border);
            margin: 0 4px;
        }

        .tb-label {
            font-family: var(--font-mono);
            font-size: 0.63rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            white-space: nowrap;
        }

        /* Pill tabs for markets */
        .market-tabs {
            display: flex;
            background: var(--bg-input);
            border-radius: 6px;
            padding: 3px;
            gap: 2px;
            border: 1px solid var(--border);
        }

        .market-tab {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--text-secondary);
            background: none;
            border: none;
            padding: 5px 11px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .market-tab:hover {
            color: var(--text-primary);
            background: var(--border);
        }

        .market-tab.active {
            background: var(--accent);
            color: #000;
            font-weight: 600;
        }

        /* Layout selector */
        .layout-btns {
            display: flex;
            gap: 3px;
        }

        .layout-btn {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 5px 9px;
            font-size: 0.7rem;
            font-family: var(--font-mono);
            font-weight: 500;
            transition: all 0.15s;
            line-height: 1;
        }

        .layout-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .layout-btn.active {
            border-color: var(--accent);
            background: var(--accent-dim);
            color: var(--accent);
        }

        /* Theme toggle */
        .theme-btn {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 5px 10px;
            font-size: 0.78rem;
            transition: all 0.15s;
        }

        .theme-btn:hover {
            border-color: var(--accent-yellow);
            color: var(--accent-yellow);
        }

        /* Template controls */
        .tpl-input {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 0.72rem;
            padding: 5px 10px;
            border-radius: 4px;
            outline: none;
            width: 130px;
            transition: border-color 0.15s;
        }

        .tpl-input:focus {
            border-color: var(--accent);
        }

        .tpl-input::placeholder {
            color: var(--text-muted);
        }

        .tpl-select {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 0.72rem;
            padding: 5px 10px;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
            transition: border-color 0.15s;
        }

        .tpl-select:focus {
            border-color: var(--accent);
        }

        .tpl-btn {
            background: var(--accent-dim);
            border: 1px solid var(--border-accent);
            color: var(--accent);
            font-family: var(--font-mono);
            font-size: 0.72rem;
            font-weight: 600;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .tpl-btn:hover {
            background: var(--accent);
            color: #000;
        }

        .tpl-del {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-family: var(--font-mono);
            font-size: 0.72rem;
            padding: 5px 9px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .tpl-del:hover {
            border-color: var(--accent-red);
            color: var(--accent-red);
        }

        /* ─── CHARTS AREA ────────────────────────────────────── */
        .main-content {
            flex: 1;
            padding: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .charts-grid {
            display: grid;
            gap: 6px;
            width: 100%;
            height: 100%;
        }

        .grid-1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
        .grid-2 { grid-template-columns: repeat(2, 1fr); grid-template-rows: 1fr; }
        .grid-3 { grid-template-columns: repeat(3, 1fr); grid-template-rows: 1fr; }
        .grid-4 { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); }
        .grid-5 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }
        .grid-6 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }

        /* ─── CHART CARD ─────────────────────────────────────── */
        .chart-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: border-color 0.2s;
            height: 100%;
        }

        .chart-card:hover {
            border-color: rgba(56, 139, 253, 0.35);
        }

        .chart-card:focus-within {
            border-color: var(--border-accent);
        }

        .chart-header {
            background: var(--bg-card-header);
            border-bottom: 1px solid var(--border);
            padding: 6px 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .chart-num {
            font-family: var(--font-mono);
            font-size: 0.6rem;
            color: var(--text-muted);
            background: var(--border);
            padding: 1px 5px;
            border-radius: 3px;
            font-weight: 600;
        }

        .chart-title {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-primary);
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chart-ticker-input {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-family: var(--font-mono);
            font-size: 0.65rem;
            padding: 3px 8px;
            border-radius: 3px;
            outline: none;
            width: 148px;
            transition: all 0.15s;
        }

        .chart-ticker-input:focus {
            border-color: var(--accent);
            color: var(--text-primary);
        }

        .chart-ticker-input::placeholder {
            color: var(--text-muted);
        }

        .tv-container {
            flex: 1;
            width: 100%;
            overflow: hidden;
        }

        /* ─── LOADING SKELETON ───────────────────────────────── */
        @keyframes shimmer {
            0% { background-position: -400px 0; }
            100% { background-position: 400px 0; }
        }

        .chart-loading {
            flex: 1;
            background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-card-header) 50%, var(--bg-card) 75%);
            background-size: 800px 100%;
            animation: shimmer 1.4s infinite linear;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-family: var(--font-mono);
            font-size: 0.7rem;
        }

        /* ─── SCROLLBAR ──────────────────────────────────────── */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* ─── RESPONSIVE ─────────────────────────────────────── */
        @media (max-width: 900px) {
            .grid-3, .grid-4, .grid-5, .grid-6 {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .grid-2, .grid-3, .grid-4, .grid-5, .grid-6 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<!-- Lista per autocomplete -->
<datalist id="ticker-suggestions">
    <option value="CAPITALCOM:ITALY40">FTSE MIB Index (CFD)</option>
    <option value="CAPITALCOM:ENI">Eni S.p.A. (CFD)</option>

</datalist>

<!-- STATUS BAR -->
<div class="statusbar">
    <div class="statusbar-brand">TERMINAL LIVE ANALYZER</div>
    <span class="statusbar-sep">│</span>
    <span style="color: var(--accent); font-size:0.65rem;">● LIVE</span>
    <span class="statusbar-sep">│</span>
    <span style="color: var(--text-muted)">TradingView powered</span>
    <div class="statusbar-time" id="clock"></div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">

    <!-- Market tabs -->
    <div class="toolbar-section">
        <span class="tb-label">Mercato</span>
        <div class="market-tabs" id="market-tabs">
            <button class="market-tab active" onclick="selectMarket('italia', this)">🇮🇹 Italia</button>
            <button class="market-tab" onclick="selectMarket('usa', this)">🇺🇸 USA</button>
            <button class="market-tab" onclick="selectMarket('forex', this)">💱 Forex</button>
            <button class="market-tab" onclick="selectMarket('commodities', this)">🛢 Materie</button>
            <button class="market-tab" onclick="selectMarket('crypto', this)">🪙 Crypto</button>
        </div>
    </div>

    <div class="toolbar-sep"></div>

    <!-- Layout -->
    <div class="toolbar-section">
        <span class="tb-label">Layout</span>
        <div class="layout-btns" id="layout-btns">
            <button class="layout-btn" onclick="setLayout(1)">1×1</button>
            <button class="layout-btn" onclick="setLayout(2)">1×2</button>
            <button class="layout-btn" onclick="setLayout(3)">1×3</button>
            <button class="layout-btn" onclick="setLayout(4)">2×2</button>
            <button class="layout-btn" onclick="setLayout(5)">2×3–</button>
            <button class="layout-btn active" onclick="setLayout(6)">2×3</button>
        </div>
    </div>

    <div class="toolbar-sep"></div>

    <!-- Theme -->
    <button class="theme-btn" onclick="toggleTheme()">☀︎</button>

    <div class="toolbar-sep"></div>

    <!-- Templates -->
    <div class="toolbar-section" style="gap:5px;">
        <span class="tb-label">Layout</span>
        <input class="tpl-input" type="text" id="template-name" placeholder="Nome layout…">
        <button class="tpl-btn" onclick="saveCurrentTemplate()">Salva</button>
        <select class="tpl-select" id="template-select" onchange="loadSavedTemplate(this.value)">
            <option value="" disabled selected>I tuoi layout…</option>
        </select>
        <button class="tpl-del" onclick="deleteSelectedTemplate()" title="Elimina layout">✕</button>
    </div>
</div>

<!-- CHARTS -->
<div class="main-content">
    <div class="charts-grid grid-6" id="charts-container"></div>
</div>

<script>
    /* ──────────────── DATA ──────────────── */
    const marketProducts = {
        "italia": [
            { name: "FTSE MIB", ticker: "CAPITALCOM:ITALY40" },
            { name: "Eni S.p.A.", ticker: "CAPITALCOM:ENI" },
            { name: "UniCredit", ticker: "CAPITALCOM:UCG" },
            { name: "Intesa Sanpaolo", ticker: "CAPITALCOM:ISP" },
            { name: "Enel", ticker: "CAPITALCOM:ENEL" },
            { name: "Ferrari", ticker: "CAPITALCOM:RACE" }
        ],
        "usa": [
            { name: "Nasdaq 100", ticker: "FXCM:NAS100" },
            { name: "S&P 500", ticker: "FXCM:SPX500" },
            { name: "Apple", ticker: "NASDAQ:AAPL" },
            { name: "Tesla", ticker: "NASDAQ:TSLA" },
            { name: "NVIDIA", ticker: "NASDAQ:NVDA" },
            { name: "Dow Jones", ticker: "FXCM:US30" }
        ],
        "forex": [
            { name: "EUR / USD", ticker: "FX:EURUSD" },
            { name: "GBP / USD", ticker: "FX:GBPUSD" },
            { name: "USD / JPY", ticker: "FX:USDJPY" },
            { name: "AUD / USD", ticker: "FX:AUDUSD" },
            { name: "EUR / GBP", ticker: "FX:EURGBP" },
            { name: "USD / CAD", ticker: "FX:USDCAD" }
        ],
        "commodities": [
            { name: "Oro (Gold)", ticker: "FXCM:XAUUSD" },
            { name: "Petrolio", ticker: "FXCM:USOIL" },
            { name: "Gas Naturale", ticker: "TVC:NG1!" },
            { name: "Argento", ticker: "FXCM:XAGUSD" },
            { name: "Rame", ticker: "COMEX:HG1!" },
            { name: "Platino", ticker: "NYMEX:PL1!" }
        ],
        "crypto": [
            { name: "Bitcoin / USDT", ticker: "BINANCE:BTCUSDT" },
            { name: "Ethereum / USDT", ticker: "BINANCE:ETHUSDT" },
            { name: "Solana / USDT", ticker: "BINANCE:SOLUSDT" },
            { name: "Ripple / USDT", ticker: "BINANCE:XRPUSDT" },
            { name: "Cardano", ticker: "BINANCE:ADAUSDT" },
            { name: "BNB", ticker: "BINANCE:BNBUSDT" }
        ]
    };

    let currentTheme = "dark";
    let currentChartCount = 6;
    let activeProducts = [...marketProducts["italia"]];
    let activeMarket = "italia";

    /* ──────────────── CLOCK ──────────────── */
    function updateClock() {
        const now = new Date();
        const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
        document.getElementById("clock").textContent =
            now.toLocaleTimeString("it-IT", { hour: "2-digit", minute: "2-digit", second: "2-digit" })
            + "  " + now.toLocaleDateString("it-IT", { day: "2-digit", month: "short", year: "numeric" });
    }
    setInterval(updateClock, 1000);
    updateClock();

    /* ──────────────── INIT ──────────────── */
    document.addEventListener("DOMContentLoaded", () => {
        if (localStorage.getItem("dashboard-theme")) {
            currentTheme = localStorage.getItem("dashboard-theme");
            document.documentElement.setAttribute("data-theme", currentTheme);
        }
        updateLocalStorageDropdown();
        renderCharts();
        updateLayoutBtns();
    });

    /* ──────────────── THEME ──────────────── */
    function toggleTheme() {
        currentTheme = (currentTheme === "dark") ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", currentTheme);
        localStorage.setItem("dashboard-theme", currentTheme);
        renderCharts();
    }

    /* ──────────────── MARKET ──────────────── */
    function selectMarket(key, btn) {
        document.querySelectorAll(".market-tab").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        activeMarket = key;
        activeProducts = [...marketProducts[key]];
        renderCharts();
    }

    /* ──────────────── LAYOUT ──────────────── */
    function setLayout(n) {
        currentChartCount = n;
        updateLayoutBtns();
        renderCharts();
    }

    function updateLayoutBtns() {
        const labels = { 1: "1×1", 2: "1×2", 3: "1×3", 4: "2×2", 5: "2×3–", 6: "2×3" };
        document.querySelectorAll(".layout-btn").forEach(b => {
            b.classList.toggle("active", b.textContent.trim() === labels[currentChartCount]);
        });
    }

    /* ──────────────── TICKER CHANGE ──────────────── */
    function changeSlotTicker(slotIndex, newTicker) {
        const clean = newTicker.trim().toUpperCase();
        let displayName = clean;
        document.querySelectorAll("#ticker-suggestions option").forEach(opt => {
            if (opt.value === clean) displayName = opt.text.split(" (")[0];
        });
        activeProducts[slotIndex] = { name: displayName, ticker: clean };
        renderCharts();
    }

    /* ──────────────── RENDER ──────────────── */
    function renderCharts() {
        const container = document.getElementById("charts-container");
        container.innerHTML = "";
        container.className = `charts-grid grid-${currentChartCount}`;

        for (let i = 0; i < currentChartCount; i++) {
            const product = activeProducts[i] || { name: "FTSE MIB", ticker: "CAPITALCOM:ITALY40" };

            const card = document.createElement("div");
            card.className = "chart-card";

            const header = document.createElement("div");
            header.className = "chart-header";

            const num = document.createElement("span");
            num.className = "chart-num";
            num.textContent = String(i + 1).padStart(2, "0");

            const title = document.createElement("span");
            title.className = "chart-title";
            title.textContent = product.name;

            const input = document.createElement("input");
            input.type = "text";
            input.className = "chart-ticker-input";
            input.value = product.ticker;
            input.setAttribute("list", "ticker-suggestions");
            input.placeholder = "Cerca ticker…";
            input.onchange = (e) => changeSlotTicker(i, e.target.value);

            header.appendChild(num);
            header.appendChild(title);
            header.appendChild(input);

            const widgetDiv = document.createElement("div");
            const widgetId = `widget_slot_${i}`;
            widgetDiv.id = widgetId;
            widgetDiv.className = "tv-container";

            card.appendChild(header);
            card.appendChild(widgetDiv);
            container.appendChild(card);

            setTimeout(() => {
                new TradingView.widget({
                    "autosize": true,
                    "symbol": product.ticker,
                    "interval": "5",
                    "timezone": "Europe/Rome",
                    "theme": currentTheme,
                    "style": "1",
                    "locale": "it",
                    "toolbar_bg": currentTheme === "dark" ? "#0d1117" : "#ffffff",
                    "enable_publishing": false,
                    "hide_top_toolbar": false,
                    "hide_legend": false,
                    "container_id": widgetId,
                    "studies": [
                        "RSI@tv-basicstudies",
                        "MACD@tv-basicstudies"
                    ]
                });
            }, i * 120);
        }
    }

    /* ──────────────── TEMPLATES ──────────────── */
    function saveCurrentTemplate() {
        const nameInput = document.getElementById("template-name");
        const templateName = nameInput.value.trim();
        if (!templateName) return;
        const tpl = { chartCount: currentChartCount, products: activeProducts.slice(0, currentChartCount) };
        let saved = JSON.parse(localStorage.getItem("unlocked-dashboard-layouts")) || {};
        saved[templateName] = tpl;
        localStorage.setItem("unlocked-dashboard-layouts", JSON.stringify(saved));
        nameInput.value = "";
        updateLocalStorageDropdown();
        document.getElementById("template-select").value = templateName;
        alert(`Layout "${templateName}" salvato!`);
    }

    function loadSavedTemplate(name) {
        if (!name) return;
        const saved = JSON.parse(localStorage.getItem("unlocked-dashboard-layouts")) || {};
        const tpl = saved[name];
        if (tpl) {
            currentChartCount = tpl.chartCount;
            activeProducts = [...tpl.products];
            updateLayoutBtns();
            renderCharts();
        }
    }

    function deleteSelectedTemplate() {
        const select = document.getElementById("template-select");
        const name = select.value;
        if (!name) return;
        if (confirm(`Cancellare il layout "${name}"?`)) {
            let saved = JSON.parse(localStorage.getItem("unlocked-dashboard-layouts")) || {};
            delete saved[name];
            localStorage.setItem("unlocked-dashboard-layouts", JSON.stringify(saved));
            updateLocalStorageDropdown();
        }
    }

    function updateLocalStorageDropdown() {
        const select = document.getElementById("template-select");
        select.innerHTML = '<option value="" disabled selected>I tuoi layout…</option>';
        const saved = JSON.parse(localStorage.getItem("unlocked-dashboard-layouts")) || {};
        Object.keys(saved).forEach(n => {
            const opt = document.createElement("option");
            opt.value = n; opt.textContent = n;
            select.appendChild(opt);
        });
    }
</script>
</body>
</html>
