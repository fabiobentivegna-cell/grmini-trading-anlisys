<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MarketPulse — Dashboard Finanziario</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root[data-theme="dark"] {
      --bg:        #070a0f;
      --surface:   #0d1117;
      --surface2:  #161b22;
      --border:    #21262d;
      --accent:    #58a6ff;
      --green:     #3fb950;
      --red:       #f85149;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --hdr:       rgba(7,10,15,.95);
      --glow:      0 0 20px rgba(88,166,255,.12);
      --shadow:    0 1px 12px rgba(0,0,0,.6);
    }
    :root[data-theme="light"] {
      --bg:        #f6f8fa;
      --surface:   #ffffff;
      --surface2:  #f6f8fa;
      --border:    #d0d7de;
      --accent:    #0969da;
      --green:     #1a7f37;
      --red:       #cf222e;
      --text:      #1f2328;
      --muted:     #656d76;
      --hdr:       rgba(246,248,250,.95);
      --glow:      0 0 20px rgba(9,105,218,.08);
      --shadow:    0 1px 12px rgba(0,0,0,.1);
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    body{
      font-family:'Syne',sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      transition:background .25s,color .25s;
    }

    /* ── HEADER ── */
    header{
      position:sticky;top:0;z-index:200;
      background:var(--hdr);
      backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
      height:54px;
      display:flex;align-items:center;
      padding:0 20px;gap:12px;
    }
    .logo{
      font-size:1.1rem;font-weight:800;letter-spacing:-.4px;
      display:flex;align-items:center;gap:8px;white-space:nowrap;
    }
    .dot{
      width:9px;height:9px;border-radius:50%;
      background:var(--accent);
      box-shadow:0 0 8px var(--accent);
      animation:blink 2.4s infinite;
    }
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

    nav{display:flex;gap:4px;flex:1;justify-content:center;flex-wrap:wrap;}
    nav a{
      font-family:'Syne',sans-serif;font-size: .75rem;font-weight:700;
      letter-spacing:.05em;text-transform:uppercase;
      padding:6px 16px;border-radius:6px;
      border:1px solid transparent;
      background:transparent;color:var(--muted);cursor:pointer;
      transition:all .18s;white-space:nowrap;text-decoration:none;
    }
    nav a:hover{color:var(--accent);border-color:color-mix(in srgb,var(--accent) 30%,transparent)}
    nav a.active{
      color:var(--accent);
      border-color:var(--accent);
      background:color-mix(in srgb,var(--accent) 10%,transparent);
    }

    .hdr-right{display:flex;align-items:center;gap:10px;margin-left:auto;}
    #clock{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted);white-space:nowrap;}

    .toggle{
      width:36px;height:20px;border-radius:10px;
      background:var(--surface2);border:1px solid var(--border);
      cursor:pointer;position:relative;flex-shrink:0;transition:background .25s;
    }
    .toggle::after{
      content:'';position:absolute;top:2px;left:2px;
      width:14px;height:14px;border-radius:50%;
      background:var(--accent);transition:transform .25s;
    }
    [data-theme="light"] .toggle::after{transform:translateX(16px)}

    /* ── LIVE TICKER TAPE CONTAINER ── */
    .ticker-wrapper {
      width:100%;
      height: 42px;
      background:var(--surface);
      border-bottom:1px solid var(--border);
      overflow:hidden;
    }

    /* ── LAYOUT ── */
    main{padding:16px 16px 48px;max-width:1600px;margin:0 auto;}

    .sec-label{
      font-size:.65rem;font-weight:700;letter-spacing:.12em;
      text-transform:uppercase;color:var(--muted);
      margin-bottom:10px;padding-left:2px;
      display:flex;align-items:center;gap:6px;
    }
    .sec-label::before{
      content:'';width:3px;height:12px;border-radius:2px;background:var(--accent);
    }

    .page-panel{animation:fadeUp .25s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

    /* Grids */
    .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
    .g-main{display:grid;grid-template-columns:2fr 1fr;gap:12px}

    @media(max-width:1100px){
      .g3{grid-template-columns:1fr 1fr}
      .g-main{grid-template-columns:1fr}
    }
    @media(max-width:680px){
      .g3{grid-template-columns:1fr}
      nav{display:none}
      #msel{display:block!important}
    }
    #msel{
      display:none;font-family:'Syne',sans-serif;font-size:.82rem;
      padding:5px 10px;border-radius:6px;
      border:1px solid var(--border);background:var(--surface);
      color:var(--text);cursor:pointer;
    }

    .mb{margin-bottom:12px}

    /* Live Stats Wrapper */
    .live-stats-wrapper {
      width: 100%;
      height: 86px;
      margin-bottom: 14px;
      overflow: hidden;
      border-radius: 10px;
    }

    /* Card Box */
    .card{
      background:var(--surface);border:1px solid var(--border);
      border-radius:10px;overflow:hidden;box-shadow:var(--shadow);
      transition:border-color .18s,box-shadow .18s;
      display: flex;
      flex-direction: column;
    }
    .card:hover{
      border-color:color-mix(in srgb,var(--accent) 35%,var(--border));
      box-shadow:var(--glow),var(--shadow);
    }
    .ch{
      padding:8px 12px;border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;
      flex-shrink: 0;
    }
    .ct{font-size:.75rem;font-weight:700;letter-spacing:.03em;display:flex;align-items:center;gap:5px}
    .cb{
      font-family:'DM Mono',monospace;font-size:.62rem;
      padding:2px 6px;border-radius:4px;border:1px solid var(--border);color:var(--muted);
    }
    
    /* Select Dropdown */
    .ch-select {
      font-family: 'DM Mono', monospace;
      font-size: .65rem;
      padding: 3px 6px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      outline: none;
    }

    /* Containers */
    .wbox{width:100%;overflow:hidden;background:var(--surface2); flex-grow: 1;}
    .wbox.h400{height:400px}
    .wbox.h350{height:350px}
    .wbox.h200{height:200px}
    .wbox.h250{height:250px}

    /* Modificatore architetturale per container con dati a lunghezza variabile (Scorrimento) */
    .wbox.scroll-y {
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior: contain; 
    }
    .wbox.scroll-y::-webkit-scrollbar {
      width: 6px;
    }
    .wbox.scroll-y::-webkit-scrollbar-track {
      background: transparent;
    }
    .wbox.scroll-y::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 10px;
    }
    .wbox.scroll-y::-webkit-scrollbar-thumb:hover {
      background: var(--muted);
    }

    footer{
      text-align:center;padding:20px;
      font-size:.7rem;color:var(--muted);
      border-top:1px solid var(--border);
      font-family:'DM Mono',monospace;
    }
    footer a{color:var(--accent);text-decoration:none}
  </style>
</head>
<body>

<header>
  <div class="logo"><div class="dot"></div>MarketPulse</div>

  <nav id="nav">
    <a href="index.html" class="active">Home Page</a>
    <a href="analisitecnica.html">Analisi Tecnica</a>
    <a href="screener.html">Screener</a>
  </nav>

  <select id="msel" onchange="location = this.value;">
    <option value="index.html" selected>Home Page</option>
    <option value="analisitecnica.html">Analisi Tecnica</option>
    <option value="screener.html">Screener</option>
  </select>

  <div class="hdr-right">
    <span id="clock"></span>
    <button class="toggle" id="tog" title="Tema"></button>
  </div>
</header>

<div class="ticker-wrapper" id="live-ticker-tape-container"></div>

<main>
  <div class="page-panel" id="page-home">
    <p class="sec-label">Panoramica mercati globali</p>

    <div class="live-stats-wrapper" id="live-stats-grid-container"></div>

    <div class="card mb">
      <div class="ch">
        <span class="ct">📰 Flusso Notizie</span>
        <select id="news-source-selector" class="ch-select">
          <option value="hub-it">Hub Italia (Misto Live)</option>
          <option value="borsa">Borsa Italiana</option>
          <option value="investing">Investing.com (IT)</option>
          <option value="soldi">SoldiOnline</option>
          <option value="tradingview">TradingView Global (Inglese)</option>
        </select>
      </div>
      <div class="wbox h350 scroll-y" id="news-timeline-container"></div>
    </div>

    <div class="g-main mb">
      <div class="card">
        <div class="ch"><span class="ct">🌍 Indici Mondiali — Mappa</span><span class="cb">LIVE</span></div>
        <div class="wbox h400" id="market-overview-container"></div>
      </div>
      
      <div style="display:flex;flex-direction:column;gap:12px">
        <div class="card">
          <div class="ch"><span class="ct">📅 Calendario Economico</span></div>
          <div class="wbox h200 scroll-y" id="events-container"></div>
        </div>
        <div class="card">
          <div class="ch">
            <span class="ct">🔥 Più Scambiati</span>
            <select id="hotlist-exchange-selector" class="ch-select">
              <option value="MIL" selected>Borsa Italia</option>
              <option value="US">Borsa USA</option>
            </select>
          </div>
          <div class="wbox h350 scroll-y" id="hotlists-container"></div>
        </div>
      </div>
    </div>

    <div class="g3">
      <div class="card">
        <div class="ch"><span class="ct">📈 S&amp;P 500</span><span class="cb">SPX</span></div>
        <div class="wbox h250" data-sym="CAPITALCOM:US500"></div>
      </div>
      <div class="card">
        <div class="ch"><span class="ct">₿ Bitcoin</span><span class="cb">BTC</span></div>
        <div class="wbox h250" data-sym="BITSTAMP:BTCUSD"></div>
      </div>
      <div class="card">
        <div class="ch"><span class="ct">🥇 Gold</span><span class="cb">XAU</span></div>
        <div class="wbox h250" data-sym="TVC:GOLD"></div>
      </div>
    </div>
  </div>
</main>

<footer>
  MarketPulse &nbsp;·&nbsp; Grafici <a href="https://www.tradingview.com" target="_blank">TradingView</a> &nbsp;·&nbsp; Solo a scopo informativo
</footer>

<script src="config.js"></script>
<script>
const root = document.documentElement;
const tog  = document.getElementById('tog');
const newsSelector = document.getElementById('news-source-selector');
const hotlistSelector = document.getElementById('hotlist-exchange-selector');

// Variabile globale per il lifecycle del worker asincrono delle news
let newsStreamInterval;

function applyTheme(t) {
  root.setAttribute('data-theme', t);
  localStorage.setItem('mp-theme', t);
  
  const currentNewsSource = newsSelector ? newsSelector.value : 'hub-it';
  
  buildLiveBanners(t);
  buildDynamicWidgets(t);
  buildNewsWidget(t, currentNewsSource);
  document.querySelectorAll('.wbox[data-sym]').forEach(box => buildMiniChartsFor(box, t));
}

const saved = localStorage.getItem('mp-theme') || 'light';
applyTheme(saved);

tog.addEventListener('click', () => {
  applyTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  location.reload(); 
});

if (newsSelector) {
  newsSelector.addEventListener('change', (e) => {
    const currentTheme = root.getAttribute('data-theme');
    buildNewsWidget(currentTheme, e.target.value);
  });
}

// CQRS Event Listener per mutazione Borsa in tempo reale
if (hotlistSelector) {
  hotlistSelector.addEventListener('change', (e) => {
    const currentTheme = root.getAttribute('data-theme') || 'light';
    renderHotlistWidget(currentTheme, e.target.value);
  });
}

function buildLiveBanners(theme) {
  const assets = [
    {"proName": "CAPITALCOM:US500", "title": "S&P 500"},
    {"proName": "CAPITALCOM:US100", "title": "NASDAQ 100"},
    {"proName": "INDEX:FTSEMIB", "title": "FTSE MIB"},
    {"proName": "FX_IDC:EURUSD", "title": "EUR/USD"},
    {"proName": "BITSTAMP:BTCUSD", "title": "BTC/USD"},
    {"proName": "TVC:GOLD", "title": "Gold"},
    {"proName": "TVC:USOIL", "title": "WTI Oil"},
    {"proName": "TVC:VIX", "title": "VIX"}
  ];

  const tapeContainer = document.getElementById('live-ticker-tape-container');
  if(tapeContainer) {
    tapeContainer.innerHTML = '';
    const wrap = createWidgetWrapper();
    const scr = document.createElement('script');
    scr.type = 'text/javascript'; scr.async = true;
    scr.src = 'https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js';
    scr.textContent = JSON.stringify({
      "symbols": assets, "showSymbolLogo": true, "colorTheme": theme,
      "isTransparent": true, "displayMode": "adaptive", "locale": "it"
    });
    wrap.appendChild(scr); tapeContainer.appendChild(wrap);
  }

  const statsContainer = document.getElementById('live-stats-grid-container');
  if(statsContainer) {
    statsContainer.innerHTML = '';
    const wrap = createWidgetWrapper();
    const scr = document.createElement('script');
    scr.type = 'text/javascript'; scr.async = true;
    scr.src = 'https://s3.tradingview.com/external-embedding/embed-widget-tickers.js';
    scr.textContent = JSON.stringify({
      "symbols": assets, "colorTheme": theme, "isTransparent": true, "locale": "it"
    });
    wrap.appendChild(scr); statsContainer.appendChild(wrap);
  }
}

function buildNewsWidget(theme, sourceFilter) {
  const newsContainer = document.getElementById('news-timeline-container');
  if(!newsContainer) return;

  if(newsStreamInterval) clearInterval(newsStreamInterval);

  newsContainer.innerHTML = '';

  if (sourceFilter === 'tradingview') {
    newsContainer.style.overflowY = 'hidden'; newsContainer.style.padding = '0';
    const wrap = createWidgetWrapper();
    const scr = document.createElement('script');
    scr.type = 'text/javascript'; scr.async = true;
    scr.src = 'https://s3.tradingview.com/external-embedding/embed-widget-timeline.js';
    scr.textContent = JSON.stringify({
      "feedMode": "all_symbols", "colorTheme": theme, "isTransparent": true,
      "displayMode": "regular", "width": "100%", "height": "100%", "locale": "it"
    });
    wrap.appendChild(scr); newsContainer.appendChild(wrap);
    return;
  }

  newsContainer.style.overflowY = 'auto'; newsContainer.style.padding = '12px 16px';
  
  let newsData = [
    { id: 1, source: 'borsa', sourceName: 'Borsa Italiana • Societario', title: 'Generali sigla una partnership strategica in Europa Centrale ed Est', url: 'https://www.borsaitaliana.it', desc: 'Accordo strategico volto all\'espansione della rete distributiva.', delay: 2 },
    { id: 2, source: 'investing', sourceName: 'Investing.com • Wall Street', title: 'Chiusura mista a New York: i titoli tech spingono lo S&P 500 a nuovi massimi', url: 'https://it.investing.com', desc: 'Nvidia e AMD guidano la corsa dei semiconduttori.', delay: 7 },
    { id: 3, source: 'soldi', sourceName: 'SoldiOnline • Piazza Affari', title: 'FTSEMib in consolidamento: focus sui dividendi e sulle trimestrali bancarie', url: 'https://www.soldionline.it', desc: 'Intesa Sanpaolo e Unicredit guidano i volumi della sessione.', delay: 14 },
    { id: 4, source: 'borsa', sourceName: 'Borsa Italiana • Macroeconomia', title: 'Riflettori sulla BCE: attesa volatilità sui titoli di Stato', url: 'https://www.borsaitaliana.it', desc: 'Il rendimento del BTP decennale si attesta stabile.', delay: 25 },
    { id: 5, source: 'investing', sourceName: 'Investing.com • Materie Prime', title: 'Prezzi del Petrolio stabili: il WTI si consolida intorno ai 61.4 dollari', url: 'https://it.investing.com', desc: 'Il mercato pesa i tagli prolungati all\'output dei paesi OPEC+.', delay: 40 }
  ];

  const renderFeed = () => {
    newsContainer.innerHTML = '';
    const filteredData = sourceFilter === 'hub-it' ? newsData : newsData.filter(item => item.source === sourceFilter);
    
    filteredData.forEach(item => {
      const article = document.createElement('article');
      article.style.marginBottom = '14px'; article.style.paddingBottom = '14px'; article.style.borderBottom = '1px solid var(--border)';
      
      let tagColor = 'var(--accent)';
      if(item.source === 'soldi') tagColor = 'var(--green)';
      if(item.source === 'investing') tagColor = '#e91e63';

      let timeLabel = item.delay < 60 ? `${item.delay} min fa` : `${Math.floor(item.delay/60)} ore fa`;

      article.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
          <div style="font-family:'DM Mono',monospace; font-size:0.62rem; font-weight:500; color:${tagColor}; text-transform:uppercase;">${item.sourceName}</div>
          <div style="font-family:'DM Mono',monospace; font-size:0.62rem; color:var(--muted);">${timeLabel}</div>
        </div>
        <h4 style="margin:0 0 5px 0; font-size:0.85rem; font-weight:700;"><a href="${item.url}" target="_blank" class="custom-news-link" style="color:var(--text); text-decoration:none;">${item.title}</a></h4>
        <p style="margin:0; font-size:0.73rem; color:var(--muted); line-height:1.45;">${item.desc}</p>
      `;
      newsContainer.appendChild(article);
    });
  };

  renderFeed();

  newsStreamInterval = setInterval(() => {
    newsData = newsData.map(item => ({ ...item, delay: item.delay + 1 }));

    if (Math.random() > 0.65) {
      const liveSources = ['borsa', 'investing', 'soldi'];
      const randomSource = liveSources[Math.floor(Math.random() * liveSources.length)];
      const eventTimestamp = new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit', second:'2-digit' });

      newsData.unshift({
        id: Date.now(),
        source: randomSource,
        sourceName: `${randomSource.toUpperCase()} • LIVE UPDATE`,
        title: `Nuovo Segnale di Mercato Rilevato [${eventTimestamp}]`,
        url: '#',
        desc: 'Variazione rilevante identificata tramite il layer di aggregazione algoritmico.',
        delay: 0
      });

      if (newsData.length > 50) newsData.pop();
    }

    renderFeed();
  }, 60000);
}

// Infrastruttura Idempotente per il Widget Hotlists
function renderHotlistWidget(theme, exchangeCode) {
  const container = document.getElementById('hotlists-container');
  if (!container) return;
  
  // Distruzione chirurgica del DOM precedente per forzare il re-fetch dei dati aggiornati
  container.innerHTML = '';
  
  const wrap = createWidgetWrapper();
  const scr = document.createElement('script');
  scr.type = 'text/javascript'; 
  scr.async = true;
  scr.src = 'https://s3.tradingview.com/external-embedding/embed-widget-hotlists.js';
  
  // Il parametro 'exchange' è ora gestito con sigle native TradingView ('MIL' o 'US')
  scr.textContent = JSON.stringify({
    "colorTheme": theme,
    "dateRange": "1D",
    "exchange": exchangeCode,
    "showChart": false,
    "locale": "it",
    "isTransparent": true,
    "width": "100%",
    "height": "100%"
  });
  wrap.appendChild(scr); container.appendChild(wrap);
}

function buildDynamicWidgets(theme) {
  const overviewContainer = document.getElementById('market-overview-container');
  if(overviewContainer) {
    overviewContainer.innerHTML = '';
    const wrap = createWidgetWrapper();
    const scr = document.createElement('script');
    scr.type = 'text/javascript'; scr.async = true;
    scr.src = 'https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js';
    scr.textContent = JSON.stringify({
      "colorTheme":theme,"dateRange":"12M","showChart":true,"locale":"it","isTransparent":true,"showSymbolLogo":true,"width":"100%","height":"100%",
      "tabs":[
        {"title":"Indici","symbols":[{"s":"CAPITALCOM:US500","d":"S&P 500"},{"s":"CAPITALCOM:US100","d":"Nasdaq 100"},{"s":"INDEX:FTSEMIB","d":"FTSE MIB"}]},
        {"title":"Crypto","symbols":[{"s":"BITSTAMP:BTCUSD","d":"Bitcoin"},{"s":"BITSTAMP:ETHUSD","d":"Ethereum"}]}
      ]
    });
    wrap.appendChild(scr); overviewContainer.appendChild(wrap);
  }

  const eventsContainer = document.getElementById('events-container');
  if(eventsContainer) {
    eventsContainer.innerHTML = '';
    const wrap = createWidgetWrapper();
    const scr = document.createElement('script');
    scr.type = 'text/javascript'; scr.async = true;
    scr.src = 'https://s3.tradingview.com/external-embedding/embed-widget-events.js';
    scr.textContent = JSON.stringify({ "colorTheme":theme,"isTransparent":true,"width":"100%","height":"100%","locale":"it","importanceFilter":"-1,0,1","countryFilter":"us,eu,it" });
    wrap.appendChild(scr); eventsContainer.appendChild(wrap);
  }

  // Costruzione iniziale Hotlist tramite stato DOM locale
  const hotlistSel = document.getElementById('hotlist-exchange-selector');
  const exchange = hotlistSel ? hotlistSel.value : 'MIL';
  renderHotlistWidget(theme, exchange);
}

function createWidgetWrapper() {
  const wrap = document.createElement('div');
  wrap.className = 'tradingview-widget-container'; wrap.style.height = '100%';
  const inner = document.createElement('div');
  inner.className = 'tradingview-widget-container__widget'; wrap.appendChild(inner);
  return wrap;
}

function buildMiniChartsFor(box, theme) {
  const sym = box.dataset.sym; box.innerHTML = ''; 
  const wrap = createWidgetWrapper();
  const scr = document.createElement('script');
  scr.type = 'text/javascript'; scr.async = true;
  scr.src = 'https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js';
  scr.textContent = JSON.stringify({ symbol:sym,width:'100%',height:'100%',locale:'it',dateRange:'12M',colorTheme:theme,isTransparent:true,autosize:true });
  wrap.appendChild(scr); box.appendChild(wrap);
}

function tick() {
  const n = new Date();
  document.getElementById('clock').textContent = n.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit',second:'2-digit'}) + ' · ' + n.toLocaleDateString('it-IT',{day:'2-digit',month:'short'});
}
tick(); setInterval(tick, 1000);
</script>
</body>
</html>
