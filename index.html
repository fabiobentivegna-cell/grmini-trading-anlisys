<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Live Analyzer</title>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #080b0e;
            --bg-bar: #0d1117;
            --bg-panel: #0d1117;
            --bg-card: #0d1117;
            --bg-card-header: #111820;
            --bg-input: #161c24;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #484f58;
            --accent: #00d4aa;
            --accent-dim: rgba(0, 212, 170, 0.12);
            --accent-blue: #388bfd;
            --accent-red: #ff4d4f;
            --accent-yellow: #f0c040;
            --border: #21262d;
            --border-accent: rgba(0, 212, 170, 0.3);
            --font-mono: 'IBM Plex Mono', monospace;
            --font-sans: 'IBM Plex Sans', sans-serif;
        }
        [data-theme="light"] {
            --bg-main: #f5f6fa; --bg-bar: #ffffff; --bg-panel: #ffffff;
            --bg-card: #ffffff; --bg-card-header: #f0f2f7; --bg-input: #eef0f6;
            --text-primary: #1c2333; --text-secondary: #57606a; --text-muted: #afb8c1;
            --accent: #0fa882; --accent-dim: rgba(15,168,130,0.08); --accent-blue: #0969da;
            --border: #d0d7de; --border-accent: rgba(15,168,130,0.3);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-sans); background: var(--bg-main); color: var(--text-primary); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* STATUS BAR */
        .statusbar { background: var(--bg-bar); border-bottom: 1px solid var(--border); height: 36px; display: flex; align-items: center; padding: 0 16px; gap: 20px; font-family: var(--font-mono); font-size: 0.68rem; flex-shrink: 0; overflow: hidden; }
        .statusbar-brand { color: var(--accent); font-weight: 600; font-size: 0.72rem; letter-spacing: 0.08em; white-space: nowrap; display: flex; align-items: center; gap: 6px; }
        .statusbar-brand::before { content: ''; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,212,170,.4)}50%{opacity:.7;box-shadow:0 0 0 4px rgba(0,212,170,0)} }
        .statusbar-sep { color: var(--border); }
        .statusbar-time { color: var(--text-secondary); margin-left: auto; white-space: nowrap; }

        /* TOOLBAR */
        .toolbar { background: var(--bg-panel); border-bottom: 1px solid var(--border); padding: 7px 14px; display: flex; align-items: center; gap: 7px; flex-wrap: wrap; flex-shrink: 0; z-index: 10; }
        .toolbar-section { display: flex; align-items: center; gap: 5px; }
        .toolbar-sep { width: 1px; height: 22px; background: var(--border); margin: 0 3px; }
        .tb-label { font-family: var(--font-mono); font-size: 0.62rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; }

        /* MARKET TABS */
        .market-tabs { display: flex; background: var(--bg-input); border-radius: 6px; padding: 3px; gap: 2px; border: 1px solid var(--border); }
        .market-tab { font-family: var(--font-mono); font-size: 0.71rem; font-weight: 500; color: var(--text-secondary); background: none; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; transition: all .15s; white-space: nowrap; }
        .market-tab:hover { color: var(--text-primary); background: var(--border); }
        .market-tab.active { background: var(--accent); color: #000; font-weight: 600; }

        /* LAYOUT BTNS */
        .layout-btns { display: flex; gap: 3px; }
        .layout-btn { background: var(--bg-input); border: 1px solid var(--border); border-radius: 4px; color: var(--text-secondary); cursor: pointer; padding: 4px 8px; font-size: 0.68rem; font-family: var(--font-mono); font-weight: 500; transition: all .15s; line-height: 1; }
        .layout-btn:hover { border-color: var(--accent); color: var(--accent); }
        .layout-btn.active { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }

        /* INDICATOR PANEL */
        .ind-panel { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
        .ind-chip { display: flex; align-items: center; gap: 4px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 4px; padding: 3px 8px; font-family: var(--font-mono); font-size: 0.65rem; color: var(--text-secondary); cursor: pointer; transition: all .15s; user-select: none; }
        .ind-chip input[type=checkbox] { width: 10px; height: 10px; accent-color: var(--accent); cursor: pointer; }
        .ind-chip:has(input:checked) { border-color: var(--border-accent); background: var(--accent-dim); color: var(--accent); }
        .ind-chip:hover { border-color: var(--accent); color: var(--accent); }

        /* THEME / TPL BTNS */
        .theme-btn { background: var(--bg-input); border: 1px solid var(--border); border-radius: 4px; color: var(--text-secondary); cursor: pointer; padding: 4px 9px; font-size: 0.75rem; transition: all .15s; }
        .theme-btn:hover { border-color: var(--accent-yellow); color: var(--accent-yellow); }
        .tpl-input { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-primary); font-family: var(--font-mono); font-size: 0.71rem; padding: 4px 9px; border-radius: 4px; outline: none; width: 120px; transition: border-color .15s; }
        .tpl-input:focus { border-color: var(--accent); }
        .tpl-input::placeholder { color: var(--text-muted); }
        .tpl-select { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-primary); font-family: var(--font-mono); font-size: 0.71rem; padding: 4px 9px; border-radius: 4px; outline: none; cursor: pointer; }
        .tpl-select:focus { border-color: var(--accent); }
        .tpl-btn { background: var(--accent-dim); border: 1px solid var(--border-accent); color: var(--accent); font-family: var(--font-mono); font-size: 0.71rem; font-weight: 600; padding: 4px 11px; border-radius: 4px; cursor: pointer; transition: all .15s; white-space: nowrap; }
        .tpl-btn:hover { background: var(--accent); color: #000; }
        .tpl-del { background: transparent; border: 1px solid var(--border); color: var(--text-muted); font-family: var(--font-mono); font-size: 0.71rem; padding: 4px 8px; border-radius: 4px; cursor: pointer; transition: all .15s; }
        .tpl-del:hover { border-color: var(--accent-red); color: var(--accent-red); }

        /* CHARTS */
        .main-content { flex: 1; padding: 7px; overflow: hidden; display: flex; flex-direction: column; }
        .charts-grid { display: grid; gap: 6px; width: 100%; height: 100%; }
        .grid-1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
        .grid-2 { grid-template-columns: repeat(2,1fr); grid-template-rows: 1fr; }
        .grid-3 { grid-template-columns: repeat(3,1fr); grid-template-rows: 1fr; }
        .grid-4 { grid-template-columns: repeat(2,1fr); grid-template-rows: repeat(2,1fr); }
        .grid-5 { grid-template-columns: repeat(3,1fr); grid-template-rows: repeat(2,1fr); }
        .grid-6 { grid-template-columns: repeat(3,1fr); grid-template-rows: repeat(2,1fr); }

        /* CHART CARD */
        .chart-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; display: flex; flex-direction: column; overflow: hidden; transition: border-color .2s; height: 100%; }
        .chart-card:hover { border-color: rgba(56,139,253,.35); }
        .chart-card:focus-within { border-color: var(--border-accent); }
        .chart-header { background: var(--bg-card-header); border-bottom: 1px solid var(--border); padding: 5px 9px; display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
        .chart-num { font-family: var(--font-mono); font-size: 0.58rem; color: var(--text-muted); background: var(--border); padding: 1px 5px; border-radius: 3px; font-weight: 600; }
        .chart-title { font-family: var(--font-mono); font-size: 0.73rem; font-weight: 600; color: var(--text-primary); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .tv-container { flex: 1; width: 100%; overflow: hidden; }

        /* SEARCH DROPDOWN */
        .search-wrap { position: relative; }
        .chart-ticker-input { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-secondary); font-family: var(--font-mono); font-size: 0.64rem; padding: 3px 8px; border-radius: 3px; outline: none; width: 150px; transition: all .15s; }
        .chart-ticker-input:focus { border-color: var(--accent); color: var(--text-primary); }
        .chart-ticker-input::placeholder { color: var(--text-muted); }
        .search-dropdown { display: none; position: absolute; top: calc(100% + 3px); right: 0; width: 280px; background: #141b24; border: 1px solid var(--border); border-radius: 6px; z-index: 1000; max-height: 260px; overflow-y: auto; box-shadow: 0 8px 24px rgba(0,0,0,.5); }
        .search-dropdown.open { display: block; }
        .search-section-label { padding: 6px 10px 3px; font-family: var(--font-mono); font-size: 0.58rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .08em; border-bottom: 1px solid var(--border); }
        .search-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 10px; cursor: pointer; transition: background .1s; }
        .search-item:hover { background: var(--bg-input); }
        .search-item-name { font-family: var(--font-sans); font-size: 0.75rem; color: var(--text-primary); }
        .search-item-ticker { font-family: var(--font-mono); font-size: 0.62rem; color: var(--text-muted); }
        .search-item.highlight .search-item-name { color: var(--accent); }
        .search-no-results { padding: 10px; font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-muted); text-align: center; }

        /* QUICK PILLS below header in each card */
        .quick-pills { display: flex; gap: 3px; padding: 4px 9px; background: var(--bg-card-header); border-bottom: 1px solid var(--border); flex-wrap: wrap; flex-shrink: 0; }
        .quick-pill { font-family: var(--font-mono); font-size: 0.6rem; color: var(--text-muted); background: var(--bg-input); border: 1px solid var(--border); padding: 2px 6px; border-radius: 3px; cursor: pointer; transition: all .12s; white-space: nowrap; }
        .quick-pill:hover { color: var(--accent); border-color: var(--border-accent); }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        @media (max-width:900px) { .grid-3,.grid-4,.grid-5,.grid-6 { grid-template-columns: repeat(2,1fr); } }
        @media (max-width:600px) { .grid-2,.grid-3,.grid-4,.grid-5,.grid-6 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<!-- STATUS BAR -->
<div class="statusbar">
    <div class="statusbar-brand">TERMINAL LIVE ANALYZER</div>
    <span class="statusbar-sep">│</span>
    <span style="color:var(--accent);font-size:.65rem">● LIVE</span>
    <span class="statusbar-sep">│</span>
    <span style="color:var(--text-muted)">TradingView powered</span>
    <div class="statusbar-time" id="clock"></div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">

    <!-- Mercati -->
    <div class="toolbar-section">
        <span class="tb-label">Mercato</span>
        <div class="market-tabs">
            <button class="market-tab active" onclick="selectMarket('italia',this)">🇮🇹 Italia</button>
            <button class="market-tab" onclick="selectMarket('usa',this)">🇺🇸 USA</button>
            <button class="market-tab" onclick="selectMarket('forex',this)">💱 Forex</button>
            <button class="market-tab" onclick="selectMarket('commodities',this)">🛢 Materie</button>
            <button class="market-tab" onclick="selectMarket('crypto',this)">🪙 Crypto</button>
        </div>
    </div>

    <div class="toolbar-sep"></div>

    <!-- Layout -->
    <div class="toolbar-section">
        <span class="tb-label">Layout</span>
        <div class="layout-btns" id="layout-btns">
            <button class="layout-btn" onclick="setLayout(1)">1×1</button>
            <button class="layout-btn" onclick="setLayout(2)">1×2</button>
            <button class="layout-btn" onclick="setLayout(3)">1×3</button>
            <button class="layout-btn" onclick="setLayout(4)">2×2</button>
            <button class="layout-btn" onclick="setLayout(5)">2×3−</button>
            <button class="layout-btn active" onclick="setLayout(6)">2×3</button>
        </div>
    </div>

    <div class="toolbar-sep"></div>

    <!-- Indicatori -->
    <div class="toolbar-section" style="flex-wrap:wrap;">
        <span class="tb-label">Indicatori</span>
        <div class="ind-panel" id="ind-panel">
            <label class="ind-chip"><input type="checkbox" value="RSI@tv-basicstudies" checked> RSI</label>
            <label class="ind-chip"><input type="checkbox" value="MACD@tv-basicstudies" checked> MACD</label>
            <label class="ind-chip"><input type="checkbox" value="BB@tv-basicstudies"> BB</label>
            <label class="ind-chip"><input type="checkbox" value="MAExp@tv-basicstudies"> EMA 20</label>
            <label class="ind-chip"><input type="checkbox" value="MASimple@tv-basicstudies"> SMA 50</label>
            <label class="ind-chip"><input type="checkbox" value="MASimple@tv-basicstudies"> SMA 200</label>
            <label class="ind-chip"><input type="checkbox" value="Volume@tv-basicstudies"> Vol</label>
            <label class="ind-chip"><input type="checkbox" value="Stochastic@tv-basicstudies"> Stoch</label>
            <label class="ind-chip"><input type="checkbox" value="ATR@tv-basicstudies"> ATR</label>
            <label class="ind-chip"><input type="checkbox" value="VWAP@tv-basicstudies"> VWAP</label>
        </div>
    </div>

    <div class="toolbar-sep"></div>

    <button class="theme-btn" onclick="toggleTheme()">☀︎</button>

    <div class="toolbar-sep"></div>

    <!-- Template -->
    <div class="toolbar-section" style="gap:4px;">
        <span class="tb-label">Layout</span>
        <input class="tpl-input" type="text" id="template-name" placeholder="Nome layout…">
        <button class="tpl-btn" onclick="saveCurrentTemplate()">Salva</button>
        <select class="tpl-select" id="template-select" onchange="loadSavedTemplate(this.value)">
            <option value="" disabled selected>I tuoi layout…</option>
        </select>
        <button class="tpl-del" onclick="deleteSelectedTemplate()" title="Elimina">✕</button>
    </div>
</div>

<!-- CHARTS -->
<div class="main-content">
    <div class="charts-grid grid-6" id="charts-container"></div>
</div>

<script>
/* ═══════════════════════════════════════════
   TICKER DATABASE — nome ricercabile + ticker
   ═══════════════════════════════════════════ */
const TICKER_DB = [
    // ── ITALIA ──
    { name:"FTSE MIB", ticker:"CAPITALCOM:ITALY40", cat:"🇮🇹 Italia" },
    { name:"Eni", ticker:"CAPITALCOM:ENI", cat:"🇮🇹 Italia" },
    { name:"UniCredit", ticker:"CAPITALCOM:UCG", cat:"🇮🇹 Italia" },
    { name:"Intesa Sanpaolo", ticker:"CAPITALCOM:ISP", cat:"🇮🇹 Italia" },
    { name:"Enel", ticker:"CAPITALCOM:ENEL", cat:"🇮🇹 Italia" },
    { name:"Ferrari", ticker:"CAPITALCOM:RACE", cat:"🇮🇹 Italia" },
    { name:"Telecom Italia", ticker:"MIL:TIT", cat:"🇮🇹 Italia" },
    { name:"Generali", ticker:"MIL:G", cat:"🇮🇹 Italia" },
    { name:"Stellantis", ticker:"MIL:STLAM", cat:"🇮🇹 Italia" },
    { name:"Mediobanca", ticker:"MIL:MB", cat:"🇮🇹 Italia" },
    { name:"Leonardo", ticker:"MIL:LDO", cat:"🇮🇹 Italia" },
    { name:"Moncler", ticker:"MIL:MONC", cat:"🇮🇹 Italia" },
    // ── USA INDICI ──
    { name:"Nasdaq 100", ticker:"FXCM:NAS100", cat:"🇺🇸 USA" },
    { name:"S&P 500", ticker:"FXCM:SPX500", cat:"🇺🇸 USA" },
    { name:"Dow Jones", ticker:"FXCM:US30", cat:"🇺🇸 USA" },
    { name:"Russell 2000", ticker:"TVC:RUT", cat:"🇺🇸 USA" },
    // ── USA STOCKS ──
    { name:"Apple", ticker:"NASDAQ:AAPL", cat:"🇺🇸 USA" },
    { name:"Tesla", ticker:"NASDAQ:TSLA", cat:"🇺🇸 USA" },
    { name:"NVIDIA", ticker:"NASDAQ:NVDA", cat:"🇺🇸 USA" },
    { name:"Amazon", ticker:"NASDAQ:AMZN", cat:"🇺🇸 USA" },
    { name:"Microsoft", ticker:"NASDAQ:MSFT", cat:"🇺🇸 USA" },
    { name:"Meta", ticker:"NASDAQ:META", cat:"🇺🇸 USA" },
    { name:"Alphabet (Google)", ticker:"NASDAQ:GOOGL", cat:"🇺🇸 USA" },
    { name:"Berkshire Hathaway", ticker:"NYSE:BRK.B", cat:"🇺🇸 USA" },
    { name:"JPMorgan Chase", ticker:"NYSE:JPM", cat:"🇺🇸 USA" },
    { name:"Palantir", ticker:"NYSE:PLTR", cat:"🇺🇸 USA" },
    // ── FOREX ──
    { name:"EUR/USD", ticker:"FX:EURUSD", cat:"💱 Forex" },
    { name:"GBP/USD", ticker:"FX:GBPUSD", cat:"💱 Forex" },
    { name:"USD/JPY", ticker:"FX:USDJPY", cat:"💱 Forex" },
    { name:"AUD/USD", ticker:"FX:AUDUSD", cat:"💱 Forex" },
    { name:"EUR/GBP", ticker:"FX:EURGBP", cat:"💱 Forex" },
    { name:"USD/CAD", ticker:"FX:USDCAD", cat:"💱 Forex" },
    { name:"USD/CHF", ticker:"FX:USDCHF", cat:"💱 Forex" },
    { name:"NZD/USD", ticker:"FX:NZDUSD", cat:"💱 Forex" },
    // ── COMMODITIES ──
    { name:"Oro (Gold)", ticker:"FXCM:XAUUSD", cat:"🛢 Materie" },
    { name:"Petrolio (WTI)", ticker:"FXCM:USOIL", cat:"🛢 Materie" },
    { name:"Gas Naturale", ticker:"TVC:NG1!", cat:"🛢 Materie" },
    { name:"Argento (Silver)", ticker:"FXCM:XAGUSD", cat:"🛢 Materie" },
    { name:"Rame (Copper)", ticker:"COMEX:HG1!", cat:"🛢 Materie" },
    { name:"Platino", ticker:"NYMEX:PL1!", cat:"🛢 Materie" },
    { name:"Palladio", ticker:"NYMEX:PA1!", cat:"🛢 Materie" },
    { name:"Grano (Wheat)", ticker:"CBOT:ZW1!", cat:"🛢 Materie" },
    // ── CRYPTO ──
    { name:"Bitcoin (BTC)", ticker:"BINANCE:BTCUSDT", cat:"🪙 Crypto" },
    { name:"Ethereum (ETH)", ticker:"BINANCE:ETHUSDT", cat:"🪙 Crypto" },
    { name:"Solana (SOL)", ticker:"BINANCE:SOLUSDT", cat:"🪙 Crypto" },
    { name:"Ripple (XRP)", ticker:"BINANCE:XRPUSDT", cat:"🪙 Crypto" },
    { name:"Cardano (ADA)", ticker:"BINANCE:ADAUSDT", cat:"🪙 Crypto" },
    { name:"BNB", ticker:"BINANCE:BNBUSDT", cat:"🪙 Crypto" },
    { name:"Dogecoin (DOGE)", ticker:"BINANCE:DOGEUSDT", cat:"🪙 Crypto" },
    { name:"Avalanche (AVAX)", ticker:"BINANCE:AVAXUSDT", cat:"🪙 Crypto" },
];

/* ═══════════════════════════════════════════
   MERCATI
   ═══════════════════════════════════════════ */
const marketProducts = {
    "italia":      TICKER_DB.filter(t=>t.cat==="🇮🇹 Italia").slice(0,6),
    "usa":         TICKER_DB.filter(t=>t.cat==="🇺🇸 USA").slice(0,6),
    "forex":       TICKER_DB.filter(t=>t.cat==="💱 Forex").slice(0,6),
    "commodities": TICKER_DB.filter(t=>t.cat==="🛢 Materie").slice(0,6),
    "crypto":      TICKER_DB.filter(t=>t.cat==="🪙 Crypto").slice(0,6),
};

/* ═══════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════ */
let currentTheme = "dark";
let currentChartCount = 6;
let activeProducts = [...marketProducts["italia"]];
let activeMarket = "italia";

/* ═══════════════════════════════════════════
   INDICATORI — legge checkbox
   ═══════════════════════════════════════════ */
function getActiveStudies() {
    const studies = [];
    document.querySelectorAll("#ind-panel input[type=checkbox]:checked").forEach(cb => {
        if (!studies.includes(cb.value)) studies.push(cb.value);
    });
    return studies;
}

document.addEventListener("change", e => {
    if (e.target.closest("#ind-panel")) renderCharts();
});

/* ═══════════════════════════════════════════
   CLOCK
   ═══════════════════════════════════════════ */
function updateClock() {
    const now = new Date();
    document.getElementById("clock").textContent =
        now.toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit",second:"2-digit"})
        + "  " + now.toLocaleDateString("it-IT",{day:"2-digit",month:"short",year:"numeric"});
}
setInterval(updateClock, 1000);
updateClock();

/* ═══════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════ */
document.addEventListener("DOMContentLoaded", () => {
    if (localStorage.getItem("dashboard-theme")) {
        currentTheme = localStorage.getItem("dashboard-theme");
        document.documentElement.setAttribute("data-theme", currentTheme);
    }
    updateLocalStorageDropdown();
    renderCharts();
    updateLayoutBtns();
    // chiudi dropdown cliccando fuori
    document.addEventListener("click", e => {
        if (!e.target.closest(".search-wrap")) closeAllDropdowns();
    });
});

/* ═══════════════════════════════════════════
   THEME
   ═══════════════════════════════════════════ */
function toggleTheme() {
    currentTheme = (currentTheme==="dark")?"light":"dark";
    document.documentElement.setAttribute("data-theme", currentTheme);
    localStorage.setItem("dashboard-theme", currentTheme);
    renderCharts();
}

/* ═══════════════════════════════════════════
   MARKET
   ═══════════════════════════════════════════ */
function selectMarket(key, btn) {
    document.querySelectorAll(".market-tab").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    activeMarket = key;
    activeProducts = [...marketProducts[key]];
    renderCharts();
}

/* ═══════════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════════ */
function setLayout(n) {
    currentChartCount = n;
    updateLayoutBtns();
    renderCharts();
}
function updateLayoutBtns() {
    const labels={1:"1×1",2:"1×2",3:"1×3",4:"2×2",5:"2×3−",6:"2×3"};
    document.querySelectorAll(".layout-btn").forEach(b=>{
        b.classList.toggle("active", b.textContent.trim()===labels[currentChartCount]);
    });
}

/* ═══════════════════════════════════════════
   SEARCH DROPDOWN
   ═══════════════════════════════════════════ */
function closeAllDropdowns() {
    document.querySelectorAll(".search-dropdown").forEach(d=>d.classList.remove("open"));
}

function openSearch(inputEl, dropdownEl) {
    closeAllDropdowns();
    buildDropdown(inputEl.value, dropdownEl, inputEl);
    dropdownEl.classList.add("open");
}

function buildDropdown(query, dropdownEl, inputEl) {
    const q = query.toLowerCase().trim();
    const results = q.length === 0
        ? TICKER_DB.slice(0, 30)
        : TICKER_DB.filter(t =>
            t.name.toLowerCase().includes(q) ||
            t.ticker.toLowerCase().includes(q) ||
            t.cat.toLowerCase().includes(q)
          ).slice(0, 25);

    if (results.length === 0) {
        dropdownEl.innerHTML = `<div class="search-no-results">Nessun risultato per "${query}"</div>`;
        return;
    }

    // Raggruppa per categoria
    const groups = {};
    results.forEach(r => {
        if (!groups[r.cat]) groups[r.cat] = [];
        groups[r.cat].push(r);
    });

    let html = "";
    for (const [cat, items] of Object.entries(groups)) {
        html += `<div class="search-section-label">${cat}</div>`;
        items.forEach(item => {
            html += `<div class="search-item" onclick="pickTicker('${item.ticker}','${item.name}',${inputEl.dataset.slot})">
                <span class="search-item-name">${highlight(item.name, q)}</span>
                <span class="search-item-ticker">${item.ticker}</span>
            </div>`;
        });
    }
    dropdownEl.innerHTML = html;
}

function highlight(text, q) {
    if (!q) return text;
    const idx = text.toLowerCase().indexOf(q);
    if (idx === -1) return text;
    return text.slice(0,idx) + `<strong style="color:var(--accent)">${text.slice(idx,idx+q.length)}</strong>` + text.slice(idx+q.length);
}

function pickTicker(ticker, name, slotIndex) {
    activeProducts[slotIndex] = { name, ticker };
    closeAllDropdowns();
    renderCharts();
}

/* ═══════════════════════════════════════════
   RENDER
   ═══════════════════════════════════════════ */
function renderCharts() {
    const container = document.getElementById("charts-container");
    container.innerHTML = "";
    container.className = `charts-grid grid-${currentChartCount}`;
    const studies = getActiveStudies();

    // Quick pills per mercato corrente
    const quickItems = marketProducts[activeMarket] || [];

    for (let i = 0; i < currentChartCount; i++) {
        const product = activeProducts[i] || { name:"FTSE MIB", ticker:"CAPITALCOM:ITALY40" };

        const card = document.createElement("div");
        card.className = "chart-card";

        // ─ Header ─
        const header = document.createElement("div");
        header.className = "chart-header";

        const num = document.createElement("span");
        num.className = "chart-num";
        num.textContent = String(i+1).padStart(2,"0");

        const title = document.createElement("span");
        title.className = "chart-title";
        title.textContent = product.name;

        // Search wrap
        const wrap = document.createElement("div");
        wrap.className = "search-wrap";

        const input = document.createElement("input");
        input.type = "text";
        input.className = "chart-ticker-input";
        input.value = product.ticker;
        input.placeholder = "Cerca nome o ticker…";
        input.dataset.slot = i;

        const dropdown = document.createElement("div");
        dropdown.className = "search-dropdown";

        input.addEventListener("focus", () => openSearch(input, dropdown));
        input.addEventListener("input", () => buildDropdown(input.value, dropdown, input));

        wrap.appendChild(input);
        wrap.appendChild(dropdown);
        header.appendChild(num);
        header.appendChild(title);
        header.appendChild(wrap);

        // ─ Quick pills ─
        const pills = document.createElement("div");
        pills.className = "quick-pills";
        quickItems.slice(0,8).forEach(item => {
            const pill = document.createElement("button");
            pill.className = "quick-pill";
            pill.textContent = item.name;
            pill.onclick = () => pickTicker(item.ticker, item.name, i);
            pills.appendChild(pill);
        });

        // ─ TV widget ─
        const widgetDiv = document.createElement("div");
        const widgetId = `widget_slot_${i}`;
        widgetDiv.id = widgetId;
        widgetDiv.className = "tv-container";

        card.appendChild(header);
        card.appendChild(pills);
        card.appendChild(widgetDiv);
        container.appendChild(card);

        setTimeout(() => {
            new TradingView.widget({
                "autosize": true,
                "symbol": product.ticker,
                "interval": "5",
                "timezone": "Europe/Rome",
                "theme": currentTheme,
                "style": "1",
                "locale": "it",
                "toolbar_bg": currentTheme==="dark" ? "#0d1117" : "#ffffff",
                "enable_publishing": false,
                "hide_top_toolbar": false,
                "hide_legend": false,
                "container_id": widgetId,
                "studies": studies
            });
        }, i * 120);
    }
}

/* ═══════════════════════════════════════════
   TEMPLATES
   ═══════════════════════════════════════════ */
function saveCurrentTemplate() {
    const nameInput = document.getElementById("template-name");
    const templateName = nameInput.value.trim();
    if (!templateName) return;
    const checkedInds = [...document.querySelectorAll("#ind-panel input:checked")].map(c=>c.value);
    const tpl = { chartCount:currentChartCount, products:activeProducts.slice(0,currentChartCount), studies:checkedInds };
    let saved = JSON.parse(localStorage.getItem("unlocked-dashboard-layouts"))||{};
    saved[templateName] = tpl;
    localStorage.setItem("unlocked-dashboard-layouts", JSON.stringify(saved));
    nameInput.value = "";
    updateLocalStorageDropdown();
    document.getElementById("template-select").value = templateName;
    alert(`Layout "${templateName}" salvato!`);
}

function loadSavedTemplate(name) {
    if (!name) return;
    const saved = JSON.parse(localStorage.getItem("unlocked-dashboard-layouts"))||{};
    const tpl = saved[name];
    if (tpl) {
        currentChartCount = tpl.chartCount;
        activeProducts = [...tpl.products];
        if (tpl.studies) {
            document.querySelectorAll("#ind-panel input").forEach(cb => {
                cb.checked = tpl.studies.includes(cb.value);
            });
        }
        updateLayoutBtns();
        renderCharts();
    }
}

function deleteSelectedTemplate() {
    const select = document.getElementById("template-select");
    const name = select.value;
    if (!name) return;
    if (confirm(`Cancellare il layout "${name}"?`)) {
        let saved = JSON.parse(localStorage.getItem("unlocked-dashboard-layouts"))||{};
        delete saved[name];
        localStorage.setItem("unlocked-dashboard-layouts", JSON.stringify(saved));
        updateLocalStorageDropdown();
    }
}

function updateLocalStorageDropdown() {
    const select = document.getElementById("template-select");
    select.innerHTML = '<option value="" disabled selected>I tuoi layout…</option>';
    const saved = JSON.parse(localStorage.getItem("unlocked-dashboard-layouts"))||{};
    Object.keys(saved).forEach(n => {
        const opt = document.createElement("option");
        opt.value = n; opt.textContent = n;
        select.appendChild(opt);
    });
}
</script>
