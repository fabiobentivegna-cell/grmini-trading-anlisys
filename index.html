<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Multi-Chart Dashboard (Investing Engine)</title>
    <style>
        :root {
            --bg-main: #0c0f12;
            --bg-navbar: #131722;
            --bg-card: #1c2030;
            --text-color: #d1d4dc;
            --text-muted: #848e9c;
            --accent-color: #2962ff;
            --border-color: #2a2e39;
            --input-bg: #2a2e39;
            --input-text: #fff;
        }

        [data-theme="light"] {
            --bg-main: #f0f2f5;
            --bg-navbar: #ffffff;
            --bg-card: #ffffff;
            --text-color: #1e222d;
            --text-muted: #707a8a;
            --accent-color: #2962ff;
            --border-color: #e0e3eb;
            --input-bg: #ffffff;
            --input-text: #1e222d;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        .navbar {
            background-color: var(--bg-navbar);
            border-bottom: 1px solid var(--border-color);
            padding: 10px 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            z-index: 10;
            box-sizing: border-box;
        }

        .brand {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-color);
        }

        .controls-group {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        select, input, button {
            background-color: var(--input-bg);
            color: var(--input-text);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            outline: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-accent {
            background-color: var(--accent-color);
            color: #fff;
            font-weight: bold;
            border: none;
        }

        .main-content {
            flex-grow: 1;
            padding: 12px;
            overflow: hidden;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .charts-grid {
            display: grid;
            gap: 12px;
            width: 100%;
            height: 100%;
            flex-grow: 1;
        }

        .grid-1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
        .grid-2 { grid-template-columns: repeat(2, 1fr); grid-template-rows: 1fr; }
        .grid-3 { grid-template-columns: repeat(3, 1fr); grid-template-rows: 1fr; }
        .grid-4 { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); }
        .grid-5 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }
        .grid-6 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }

        .chart-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 4px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            height: 100%;
        }

        .iframe-container {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 4px;
        }

        .template-section {
            border-left: 1px solid var(--border-color);
            padding-left: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="brand">📊 Investing Engine Terminal</div>
        
        <div class="controls-group">
            <div>
                <label for="market-select">Mercato Base:</label>
                <select id="market-select" onchange="loadPredefinedMarket(this.value)">
                    <option value="italia" selected>🇮🇹 FTSE MIB & Italia</option>
                    <option value="usa">🇺🇸 Indici & Azioni USA</option>
                    <option value="forex">💱 Forex Pairs</option>
                    <option value="commodities">🛢️ Commodities</option>
                    <option value="crypto">🪙 Crypto</option>
                </select>
            </div>

            <div>
                <label for="chart-count">Finestre (1-6):</label>
                <select id="chart-count" onchange="updateChartCount(parseInt(this.value))">
                    <option value="1">1 Grafico</option>
                    <option value="2">2 Grafici</option>
                    <option value="3" selected>3 Grafici</option>
                    <option value="4">4 Grafici</option>
                    <option value="5">5 Grafici</option>
                    <option value="6">6 Grafici</option>
                </select>
            </div>

            <button onclick="toggleTheme()">🌓 Cambia Tema</button>
        </div>

        <div class="controls-group template-section">
            <div>
                <input type="text" id="template-name" placeholder="Nome template...">
                <button class="btn-accent" onclick="saveCurrentTemplate()">Salva Layout</button>
            </div>
            <div>
                <select id="template-select" onchange="loadSavedTemplate(this.value)">
                    <option value="" disabled selected>I tuoi Template...</option>
                </select>
                <button onclick="deleteSelectedTemplate()" style="color: #ff4d4f;">Elimina</button>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="charts-grid grid-3" id="charts-container"></div>
    </div>

    <script type="text/javascript">
        // Coppie ID nativi di Investing.com (Garantiscono ricerca e fluidità di dati su tutti i TF)
        const marketProducts = {
            "italia": [
                { pairId: 177, title: "FTSE MIB" },
                { pairId: 10183, title: "Eni" },
                { pairId: 10196, title: "UniCredit" },
                { pairId: 10185, title: "Intesa Sanpaolo" },
                { pairId: 10182, title: "Enel" },
                { pairId: 954546, title: "Ferrari" }
            ],
            "usa": [
                { pairId: 14958, title: "NASDAQ Composite" },
                { pairId: 166, title: "S&P 500" },
                { pairId: 6408, title: "Apple" },
                { pairId: 13994, title: "Tesla" },
                { pairId: 6435, title: "NVIDIA" },
                { pairId: 252, title: "Dow Jones" }
            ],
            "forex": [
                { pairId: 1, title: "EUR/USD" },
                { pairId: 2, title: "GBP/USD" },
                { pairId: 3, title: "USD/JPY" },
                { pairId: 5, title: "AUD/USD" },
                { pairId: 9, title: "EUR/GBP" },
                { pairId: 7, title: "USD/CAD" }
            ],
            "commodities": [
                { pairId: 8830, title: "Oro (Gold)" },
                { pairId: 8849, title: "Petrolio (Crude Oil)" },
                { pairId: 8862, title: "Gas Naturale" },
                { pairId: 8836, title: "Argento" },
                { pairId: 8831, title: "Palladio" },
                { pairId: 8910, title: "Rame" }
            ],
            "crypto": [
                { pairId: 945629, title: "Bitcoin (BTC/USD)" },
                { pairId: 997650, title: "Ethereum (ETH/USD)" },
                { pairId: 1057824, title: "Solana (SOL/USD)" },
                { pairId: 1057865, title: "Ripple (XRP/USD)" },
                { pairId: 1058142, title: "Cardano (ADA/USD)" },
                { pairId: 1057831, title: "BNB/USD" }
            ]
        };

        let currentTheme = "dark";
        let currentChartCount = 3;
        let activeProducts = [...marketProducts["italia"]]; 

        document.addEventListener("DOMContentLoaded", function() {
            if (localStorage.getItem("dashboard-theme")) {
                currentTheme = localStorage.getItem("dashboard-theme");
                document.documentElement.setAttribute("data-theme", currentTheme);
            }
            updateLocalStorageDropdown();
            renderCharts();
        });

        function toggleTheme() {
            currentTheme = (currentTheme === "dark") ? "light" : "dark";
            document.documentElement.setAttribute("data-theme", currentTheme);
            localStorage.setItem("dashboard-theme", currentTheme);
            renderCharts();
        }

        function updateChartCount(count) {
            currentChartCount = count;
            renderCharts();
        }

        function loadPredefinedMarket(marketKey) {
            if(!marketKey) return;
            activeProducts = [...marketProducts[marketKey]];
            renderCharts();
        }

        function renderCharts() {
            const container = document.getElementById("charts-container");
            container.innerHTML = "";
            container.className = `charts-grid grid-${currentChartCount}`;

            const themeParam = currentTheme === "dark" ? "dark" : "light";

            for (let i = 0; i < currentChartCount; i++) {
                const product = activeProducts[i] || { pairId: 177, title: "FTSE MIB" };
                
                const card = document.createElement("div");
                card.className = "chart-card";

                const iframe = document.createElement("iframe");
                iframe.className = "iframe-container";
                
                // Generazione dell'Advanced Chart Engine di Investing sbloccato
                iframe.src = `https://it.widgets.investing.com/live-charts?pair_id=${product.pairId}&theme=${themeParam}&mode=advanced`;
                iframe.allowFullscreen = true;
                iframe.setAttribute("frameborder", "0");
                iframe.setAttribute("allowtransparency", "true");

                card.appendChild(iframe);
                container.appendChild(card);
            }
        }

        /* --- SISTEMA DI SALVATAGGIO LAYOUT IN LOCALSTORAGE --- */
        function saveCurrentTemplate() {
            const nameInput = document.getElementById("template-name");
            const templateName = nameInput.value.trim();
            if (!templateName) return;

            const templateData = {
                chartCount: currentChartCount,
                products: activeProducts.slice(0, currentChartCount)
            };

            let savedTemplates = JSON.parse(localStorage.getItem("investing-dashboard-templates")) || {};
            savedTemplates[templateName] = templateData;
            localStorage.setItem("investing-dashboard-templates", JSON.stringify(savedTemplates));
            
            nameInput.value = "";
            updateLocalStorageDropdown();
            document.getElementById("template-select").value = templateName;
            alert(`Layout "${templateName}" salvato!`);
        }

        function loadSavedTemplate(templateName) {
            if (!templateName) return;
            const savedTemplates = JSON.parse(localStorage.getItem("investing-dashboard-templates")) || {};
            const template = savedTemplates[templateName];
            if (template) {
                currentChartCount = template.chartCount;
                activeProducts = [...template.products];
                document.getElementById("chart-count").value = currentChartCount;
                renderCharts();
            }
        }

        function deleteSelectedTemplate() {
            const select = document.getElementById("template-select");
            const name = select.value;
            if (!name) return;
            if (confirm(`Eliminare il layout "${name}"?`)) {
                let savedTemplates = JSON.parse(localStorage.getItem("investing-dashboard-templates")) || {};
                delete savedTemplates[name];
                localStorage.setItem("investing-dashboard-templates", JSON.stringify(savedTemplates));
                updateLocalStorageDropdown();
                renderCharts();
            }
        }

        function updateLocalStorageDropdown() {
            const select = document.getElementById("template-select");
            select.innerHTML = '<option value="" disabled selected>I tuoi Template...</option>';
            const savedTemplates = JSON.parse(localStorage.getItem("investing-dashboard-templates")) || {};
            Object.keys(savedTemplates).forEach(name => {
                const option = document.createElement("option");
                option.value = name; option.innerText = name;
                select.appendChild(option);
            });
        }
    </script>
</body>
</html>
