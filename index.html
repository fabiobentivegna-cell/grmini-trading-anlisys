<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Multi-Chart Dashboard Pro (Sbloccata)</title>
    <style>
        :root {
            --bg-main: #0c0f12;
            --bg-navbar: #131722;
            --bg-card: #1c2030;
            --text-color: #d1d4dc;
            --text-muted: #848e9c;
            --accent-color: #2962ff;
            --border-color: #2a2e39;
            --input-bg: #2a2e39;
            --input-text: #fff;
            --select-text: #fff;
        }

        [data-theme="light"] {
            --bg-main: #f0f2f5;
            --bg-navbar: #ffffff;
            --bg-card: #ffffff;
            --text-color: #1e222d;
            --text-muted: #707a8a;
            --accent-color: #2962ff;
            --border-color: #e0e3eb;
            --input-bg: #ffffff;
            --input-text: #1e222d;
            --select-text: #1e222d;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        .navbar {
            background-color: var(--bg-navbar);
            border-bottom: 1px solid var(--border-color);
            padding: 10px 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            z-index: 10;
            box-sizing: border-box;
        }

        .brand {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-color);
        }

        .controls-group {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        select, input, button {
            background-color: var(--input-bg);
            color: var(--select-text);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            outline: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        input {
            color: var(--input-text);
            cursor: text;
        }

        .btn-accent {
            background-color: var(--accent-color);
            color: #fff;
            font-weight: bold;
            border: none;
        }

        .main-content {
            flex-grow: 1;
            padding: 12px;
            overflow: hidden;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .charts-grid {
            display: grid;
            gap: 12px;
            width: 100%;
            height: 100%;
            flex-grow: 1;
        }

        .grid-1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
        .grid-2 { grid-template-columns: repeat(2, 1fr); grid-template-rows: 1fr; }
        .grid-3 { grid-template-columns: repeat(3, 1fr); grid-template-rows: 1fr; }
        .grid-4 { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); }
        .grid-5 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }
        .grid-6 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }

        .chart-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 6px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            height: 100%;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            padding: 0 4px;
        }

        .chart-title {
            font-size: 0.9rem;
            font-weight: 600;
        }

        .iframe-container {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 4px;
            background-color: #1c2030;
        }

        .template-section {
            border-left: 1px solid var(--border-color);
            padding-left: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="brand">📊 Multi-Market Engine Pro</div>
        
        <div class="controls-group">
            <div>
                <label for="market-select">Mercato:</label>
                <select id="market-select" onchange="loadPredefinedMarket(this.value)">
                    <option value="indices">📉 Indici Mondiali</option>
                    <option value="crypto">🪙 Crypto</option>
                    <option value="usa">🇺🇸 Azionario USA</option>
                    <option value="italia">🇮🇹 Azionario Italia</option>
                    <option value="forex">💱 Forex</option>
                    <option value="commodities">🛢️ Commodities</option>
                </select>
            </div>

            <div>
                <label for="chart-count">Grafici (1-6):</label>
                <select id="chart-count" onchange="updateChartCount(parseInt(this.value))">
                    <option value="1">1 Grafico</option>
                    <option value="2">2 Grafici</option>
                    <option value="3" selected>3 Grafici</option>
                    <option value="4">4 Grafici</option>
                    <option value="5">5 Grafici</option>
                    <option value="6">6 Grafici</option>
                </select>
            </div>

            <button onclick="toggleTheme()">🌓 Cambia Tema</button>
        </div>

        <div class="controls-group template-section">
            <div>
                <input type="text" id="template-name" placeholder="Nome template...">
                <button class="btn-accent" onclick="saveCurrentTemplate()">Salva Custom</button>
            </div>
            <div>
                <select id="template-select" onchange="loadSavedTemplate(this.value)">
                    <option value="" disabled selected>I tuoi Template...</option>
                </select>
                <button onclick="deleteSelectedTemplate()" style="color: #ff4d4f;">Elimina</button>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="charts-grid grid-3" id="charts-container"></div>
    </div>

    <script type="text/javascript">
        // Elenco simboli universali Barchart / ChartIQ
        const marketProducts = {
            "indices": [
                { name: "FTSE MIB ($FTSEM)", ticker: "$FTSEM" },
                { name: "Nasdaq 100 ($NASX)", ticker: "$NASX" },
                { name: "S&P 500 ($SPX)", ticker: "$SPX" },
                { name: "DAX 40 ($DAX)", ticker: "$DAX" },
                { name: "Dow Jones ($DOW)", ticker: "$DOW" },
                { name: "Nikkei 225 ($NKI)", ticker: "$NKI" }
            ],
            "crypto": [
                { name: "Bitcoin ($BTCUSD)", ticker: "$BTCUSD" },
                { name: "Ethereum ($ETHUSD)", ticker: "$ETHUSD" },
                { name: "Solana ($SOLUSD)", ticker: "$SOLUSD" },
                { name: "Ripple ($XRPUSD)", ticker: "$XRPUSD" },
                { name: "Cardano ($ADAUSD)", ticker: "$ADAUSD" },
                { name: "Binance Coin", ticker: "$BNBUSD" }
            ],
            "usa": [
                { name: "Apple (AAPL)", ticker: "AAPL" },
                { name: "Tesla (TSLA)", ticker: "TSLA" },
                { name: "NVIDIA (NVDA)", ticker: "NVDA" },
                { name: "Microsoft (MSFT)", ticker: "MSFT" },
                { name: "Amazon (AMZN)", ticker: "AMZN" },
                { name: "Meta (META)", ticker: "META" }
            ],
            "italia": [
                { name: "Eni (ENI.IT)", ticker: "ENI.IT" },
                { name: "UniCredit (UCG.IT)", ticker: "UCG.IT" },
                { name: "Intesa Sanpaolo (ISP.IT)", ticker: "ISP.IT" },
                { name: "Enel (ENEL.IT)", ticker: "ENEL.IT" },
                { name: "Ferrari (RACE.IT)", ticker: "RACE.IT" },
                { name: "Stellantis (STLAM.IT)", ticker: "STLAM.IT" }
            ],
            "forex": [
                { name: "EUR / USD", ticker: "EURUSD" },
                { name: "GBP / USD", ticker: "GBPUSD" },
                { name: "USD / JPY", ticker: "USDJPY" },
                { name: "AUD / USD", ticker: "AUDUSD" },
                { name: "EUR / GBP", ticker: "EURGBP" },
                { name: "USD / CAD", ticker: "USDCAD" }
            ],
            "commodities": [
                { name: "Oro (Gold)", ticker: "GCY00" },
                { name: "Petrolio (Oil)", ticker: "CLY00" },
                { name: "Gas Naturale", ticker: "NGY00" },
                { name: "Argento (Silver)", ticker: "SIY00" },
                { name: "Rame", ticker: "HGY00" },
                { name: "Platino", ticker: "PLY00" }
            ]
        };

        let currentTheme = "dark";
        let currentChartCount = 3;
        let activeProducts = [...marketProducts["indices"]]; 

        document.addEventListener("DOMContentLoaded", function() {
            if (localStorage.getItem("dashboard-theme")) {
                currentTheme = localStorage.getItem("dashboard-theme");
                document.documentElement.setAttribute("data-theme", currentTheme);
            }
            updateLocalStorageDropdown();
            renderCharts();
        });

        function toggleTheme() {
            currentTheme = (currentTheme === "dark") ? "light" : "dark";
            document.documentElement.setAttribute("data-theme", currentTheme);
            localStorage.setItem("dashboard-theme", currentTheme);
            renderCharts();
        }

        function updateChartCount(count) {
            currentChartCount = count;
            renderCharts();
        }

        function loadPredefinedMarket(marketKey) {
            if(!marketKey) return;
            activeProducts = [...marketProducts[marketKey]];
            renderCharts();
        }

        function changeSlotTicker(slotIndex, newTicker) {
            const clean = newTicker.trim().toUpperCase();
            activeProducts[slotIndex] = { name: `Asset: ${clean}`, ticker: clean };
            renderCharts();
        }

        function renderCharts() {
            const container = document.getElementById("charts-container");
            container.innerHTML = "";
            container.className = `charts-grid grid-${currentChartCount}`;

            const themeMode = currentTheme === "dark" ? "barchart" : "light";

            for (let i = 0; i < currentChartCount; i++) {
                const product = activeProducts[i] || { name: "FTSE MIB", ticker: "$FTSEM" };
                
                const card = document.createElement("div");
                card.className = "chart-card";

                const header = document.createElement("div");
                header.className = "chart-header";

                const title = document.createElement("span");
                title.className = "chart-title";
                title.innerText = `${product.name}`;

                const input = document.createElement("input");
                input.type = "text";
                input.value = product.ticker;
                input.placeholder = "Cambia Simbolo...";
                input.style.width = "110px";
                input.style.fontSize = "0.75rem";
                input.style.padding = "3px 6px";
                input.onchange = (e) => changeSlotTicker(i, e.target.value);

                header.appendChild(title);
                header.appendChild(input);

                // NUOVO ENGINE CHARTIQ EXTRA-FUNZIONANTE SENZA RESTRIZIONI DI RETE
                const iframe = document.createElement("iframe");
                iframe.className = "iframe-container";
                
                // Integrazione pulita della libreria di analisi Barchart Advanced Free
                iframe.src = `https://www.barchart.com/shared-charts/embed?symbol=${encodeURIComponent(product.ticker)}&theme=${themeMode}&meta=0&study=`;
                iframe.allowFullscreen = true;

                card.appendChild(header);
                card.appendChild(iframe);
                container.appendChild(card);
            }
        }

        /* --- LOGICA DI SALVATAGGIO DEI TEMPLATE (LOCALSTORAGE) --- */
        function saveCurrentTemplate() {
            const nameInput = document.getElementById("template-name");
            const templateName = nameInput.value.trim();
            if (!templateName) return;

            const templateData = {
                chartCount: currentChartCount,
                products: activeProducts.slice(0, currentChartCount)
            };

            let savedTemplates = JSON.parse(localStorage.getItem("dashboard-custom-templates")) || {};
            savedTemplates[templateName] = templateData;
            localStorage.setItem("dashboard-custom-templates", JSON.stringify(savedTemplates));
            
            nameInput.value = "";
            updateLocalStorageDropdown();
            document.getElementById("template-select").value = templateName;
            alert(`Template "${templateName}" salvato!`);
        }

        function loadSavedTemplate(templateName) {
            if (!templateName) return;
            const savedTemplates = JSON.parse(localStorage.getItem("dashboard-custom-templates")) || {};
            const template = savedTemplates[templateName];
            if (template) {
                currentChartCount = template.chartCount;
                activeProducts = [...template.products];
                document.getElementById("chart-count").value = currentChartCount;
                renderCharts();
            }
        }

        function deleteSelectedTemplate() {
            const select = document.getElementById("template-select");
            const name = select.value;
            if (!name) return;
            if (confirm(`Eliminare "${name}"?`)) {
                let savedTemplates = JSON.parse(localStorage.getItem("dashboard-custom-templates")) || {};
                delete savedTemplates[name];
                localStorage.setItem("dashboard-custom-templates", JSON.stringify(savedTemplates));
                updateLocalStorageDropdown();
                renderCharts();
            }
        }

        function updateLocalStorageDropdown() {
            const select = document.getElementById("template-select");
            select.innerHTML = '<option value="" disabled selected>I tuoi Template...</option>';
            const savedTemplates = JSON.parse(localStorage.getItem("dashboard-custom-templates")) || {};
            Object.keys(savedTemplates).forEach(name => {
                const option = document.createElement("option");
                option.value = name; option.innerText = name;
                select.appendChild(option);
            });
        }
    </script>
</body>
</html>
