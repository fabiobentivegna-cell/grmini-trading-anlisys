<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Workspace - Multi-Chart</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent-blue: #58a6ff;
            --border-color: #30363d;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Barra di Navigazione Superiore */
        nav {
            background-color: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .nav-links {
            display: flex;
            gap: 15px;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            padding: 6px 12px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .nav-links a.active, .nav-links a:hover {
            color: var(--text-main);
            background-color: rgba(88, 166, 255, 0.15);
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        select, button {
            background-color: var(--bg-color);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            outline: none;
        }

        /* Griglia dei grafici */
        .grid-container {
            display: grid;
            flex-grow: 1;
            gap: 4px;
            padding: 4px;
            background-color: var(--border-color);
            height: calc(100vh - 55px);
        }

        .grid-2x2 { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); }
        .grid-3x2 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }
        .grid-1x1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }

        .chart-wrapper {
            background-color: var(--bg-color);
            width: 100%;
            height: 100%;
        }
    </style>
    <!-- Script Libreria TradingView -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>

    <nav>
        <div class="nav-links">
            <a href="index.html" class="active">📈 Multi-Chart Workspace</a>
            <a href="screener.html">🔍 Stock Screener</a>
        </div>
        <div class="controls">
            <select id="gridSelect" onchange="changeLayout()">
                <option value="grid-2x2">Griglia 2x2</option>
                <option value="grid-3x2">Griglia 3x2</option>
                <option value="grid-1x1">Grafico Singolo</option>
            </select>
        </div>
    </nav>

    <div id="gridContainer" class="grid-container grid-2x2"></div>

    <script>
        // Ticker di default (Puoi modificarli inserendo i tuoi preferiti, es: "MIL:ENI", "NASDAQ:AAPL")
        const defaultTickers = ["NASDAQ:AAPL", "NASDAQ:TSLA", "NASDAQ:NVDA", "NASDAQ:MSFT", "NASDAQ:AMD", "NASDAQ:META"];
        const layoutConfig = { "grid-1x1": 1, "grid-2x2": 4, "grid-3x2": 6 };

        function initCharts() {
            const container = document.getElementById('gridContainer');
            const layout = document.getElementById('gridSelect').value;
            const numCharts = layoutConfig[layout];
            
            container.innerHTML = '';

            for (let i = 0; i < numCharts; i++) {
                const chartId = `chart_${i}`;
                const ticker = defaultTickers[i] || "NASDAQ:AAPL";

                const wrapper = document.createElement('div');
                wrapper.className = 'chart-wrapper';
                wrapper.innerHTML = `<div id="${chartId}" style="width: 100%; height: 100%;"></div>`;
                container.appendChild(wrapper);

                new TradingView.widget({
                    "autosize": true,
                    "symbol": ticker,
                    "interval": "D",
                    "timezone": "Europe/Rome",
                    "theme": "dark",
                    "style": "1",
                    "locale": "it",
                    "enable_publishing": false,
                    "hide_side_toolbar": false,
                    "allow_symbol_change": true,
                    "container_id": chartId,
                    "studies": ["RSI@tv-basicstudies", "MASimple@tv-basicstudies"]
                });
            }
        }

        function changeLayout() {
            document.getElementById('gridContainer').className = 'grid-container ' + document.getElementById('gridSelect').value;
            initCharts();
        }

        window.onload = initCharts;
    </script>
</body>
</html>
